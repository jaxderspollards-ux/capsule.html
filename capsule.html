<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💊 和好胶囊</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #ffe0f0 50%, #f8d7e6 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 420px; width: 100%;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(20px);
      border-radius: 40px; box-shadow: 0 25px 50px rgba(255,105,135,0.2);
      padding: 30px 25px; text-align: center;
      max-height: 90vh; overflow-y: auto;
    }
    h1 { font-size: 24px; color: #d6336c; margin-bottom: 5px; font-weight: 700; }
    .sub-title { font-size: 14px; color: #e6739f; margin-bottom: 20px; }

    .password-input {
      width: 100%; padding: 14px 20px; border: 2px solid #faa2c1; border-radius: 50px;
      font-size: 16px; text-align: center; color: #d6336c; background: #fff;
      outline: none; margin-bottom: 15px;
    }
    .password-input:focus { border-color: #ff6b9d; }
    .error-msg { color: #e03131; font-size: 14px; margin-top: 10px; display: none; }

    .input-field {
      width: 100%; padding: 14px 20px; border: 2px solid #faa2c1; border-radius: 50px;
      font-size: 16px; text-align: center; color: #d6336c; background: #fff;
      outline: none; margin-bottom: 15px;
    }
    .input-field:focus { border-color: #ff6b9d; }

    .upload-area {
      border: 2px dashed #faa2c1; border-radius: 24px; padding: 20px;
      background: rgba(255,218,224,0.3); cursor: pointer; margin-bottom: 10px;
    }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-text { color: #d6336c; font-size: 14px; font-weight: 500; }
    .upload-count { font-size: 12px; color: #e6739f; margin-top: 5px; }
    .preview-grid { 
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; 
      margin: 10px 0; max-height: 200px; overflow-y: auto; padding: 5px;
    }
    .preview-thumb { 
      width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; 
      border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }

    .message-section { margin: 15px 0; text-align: left; }
    .message-label { font-size: 14px; color: #d6336c; font-weight: 600; margin-bottom: 6px; display: block; }
    .message-textarea {
      width: 100%; height: 80px; border: 2px solid #faa2c1; border-radius: 16px;
      padding: 10px; font-size: 14px; color: #555; resize: none; outline: none;
      font-family: inherit; background: rgba(255,255,255,0.8);
    }
    .char-count { font-size: 11px; color: #999; text-align: right; margin-top: 3px; }

    .voice-section { margin: 15px 0; text-align: left; }
    .voice-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .voice-btn {
      background: #fff; border: 2px solid #faa2c1; color: #d6336c;
      padding: 12px 20px; border-radius: 50px; font-size: 15px; cursor: pointer;
    }
    .voice-btn.recording { background: #ff6b9d; color: white; border-color: #ff6b9d; animation: pulse 1s infinite; }
    .voice-status { font-size: 12px; color: #e6739f; margin-top: 6px; width: 100%; }
    .replay-btn {
      background: transparent; border: 1px solid #faa2c1; color: #d6336c;
      padding: 6px 14px; border-radius: 50px; font-size: 13px; cursor: pointer; margin-left: 8px;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

    .music-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .select-field {
      flex: 1; padding: 10px 16px; border: 2px solid #faa2c1; border-radius: 50px;
      font-size: 14px; color: #d6336c; background: #fff; outline: none;
    }
    .preview-btn {
      background: #fff; border: 2px solid #faa2c1; color: #d6336c;
      padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b9d, #c44569); border: none; color: white;
      padding: 14px 30px; border-radius: 50px; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 20px rgba(255,107,157,0.4);
      width: 100%; margin-top: 10px;
    }
    .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .note { font-size: 11px; color: #999; margin-top: 15px; }

    .progress-bar {
      width: 100%; height: 6px; background: #ffe0f0; border-radius: 3px;
      margin: 10px 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(135deg, #ff6b9d, #c44569);
      border-radius: 3px; width: 0%; transition: width 0.2s;
    }
    .status-text { font-size: 13px; color: #e6739f; margin: 8px 0; }

    .nickname-bar {
      background: linear-gradient(135deg, #ffd1dc, #ffe0ec);
      border-radius: 20px; padding: 10px 20px; margin-bottom: 20px;
      font-size: 14px; color: #d6336c; font-weight: 600;
    }
    .start-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 30px;
      padding: 25px 20px; margin: 20px 0; border: 2px solid #ffb3c6;
    }
    .start-emoji { font-size: 50px; margin-bottom: 10px; }
    .start-desc { color: #666; font-size: 14px; margin: 10px 0; line-height: 1.6; }

    /* 拆信动画 */
    .envelope-container { position: relative; width: 280px; height: 200px; margin: 30px auto; cursor: pointer; }
    .envelope-body { position: absolute; bottom: 0; width: 100%; height: 140px; background: linear-gradient(160deg, #fef5e7 0%, #fdebd0 100%); border-radius: 8px; box-shadow: 0 8px 25px rgba(139,90,43,0.15); }
    .envelope-flap { position: absolute; top: 0; width: 100%; height: 100px; background: linear-gradient(135deg, #fef0d5, #f5d6a8); clip-path: polygon(50% 100%, 0 0, 100% 0); transform-origin: top center; transition: transform 0.6s ease; z-index: 2; }
    .envelope-flap.open { transform: rotateX(180deg); }
    .envelope-seal { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: linear-gradient(135deg, #e8a0b4, #d6336c); border-radius: 50%; z-index: 3; box-shadow: 0 4px 12px rgba(214,51,108,0.3); display: flex; justify-content: center; align-items: center; font-size: 18px; color: white; transition: opacity 0.5s ease; }
    .envelope-seal.hidden { opacity: 0; pointer-events: none; }
    .letter-paper { position: absolute; top: 20px; left: 10%; width: 80%; height: 0; background: #fffef9; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; transition: height 0.8s ease 0.3s; z-index: 1; padding: 0 15px; }
    .letter-paper.show { height: 160px; }
    .letter-text { font-family: 'Georgia', 'Noto Serif SC', serif; font-size: 14px; color: #4a3728; line-height: 1.8; padding-top: 20px; opacity: 0; transition: opacity 0.5s ease 0.6s; }
    .letter-paper.show .letter-text { opacity: 1; }

    .slideshow-viewer {
      width: 100%; height: 320px; border-radius: 24px; background: #1a1a1a;
      overflow: hidden; position: relative; margin: 15px 0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
      display: flex; justify-content: center; align-items: center;
    }
    .slideshow-viewer img {
      position: absolute; width: 90%; height: auto; max-height: 280px;
      object-fit: contain; border-radius: 12px;
      border: 2px solid #ffd1dc; background: #fff;
      transition: opacity 1.2s ease-in-out;
      opacity: 0;
    }
    .slideshow-viewer img.active { opacity: 1; }

    .quiz-input {
      width: 80%; padding: 12px 20px; border: 2px solid #faa2c1; border-radius: 50px;
      font-size: 16px; text-align: center; color: #d6336c; background: #fff;
      outline: none; margin: 10px auto; display: block;
    }
    .quiz-error { color: #e03131; font-size: 13px; margin-top: 5px; display: none; }

    .coupon-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 30px;
      padding: 25px 20px; margin: 15px 0; border: 2px solid #ffb3c6;
      box-shadow: 0 15px 30px rgba(255,105,135,0.2);
    }
    .coupon-title { font-size: 22px; color: #d6336c; font-weight: 700; margin-bottom: 8px; }
    .coupon-desc { font-size: 14px; color: #555; margin-bottom: 20px; }
    .forgive-btn {
      background: #ff4d6d; font-size: 18px; padding: 15px 35px; border: none; color: white;
      border-radius: 50px; font-weight: 600; letter-spacing: 1px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,77,109,0.4); animation: pulse 1.8s infinite;
      width: 80%; margin: 0 auto;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5); }
      70% { box-shadow: 0 0 0 15px rgba(255,77,109,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
    }
    .forgiven-msg { font-size: 18px; color: #d6336c; font-weight: 700; margin-top: 20px; }
    .memorial-btn {
      background: linear-gradient(135deg, #ffb3c6, #faa2c1); border: none; color: white;
      padding: 14px 30px; border-radius: 50px; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 20px rgba(255,107,157,0.2);
      width: 80%; margin: 20px auto 0; display: block;
    }
    .error-text { color: #999; font-size: 14px; margin: 20px 0; }

    /* 粉色语音播放按钮 */
    .voice-player-wrapper {
      display: flex; align-items: center; gap: 12px; justify-content: center;
      background: rgba(255,218,224,0.4); border-radius: 50px;
      padding: 15px 25px; margin: 20px auto; max-width: 260px;
    }
    .voice-play-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b9d, #d6336c);
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 6px 15px rgba(255,107,157,0.3);
      transition: transform 0.2s; flex-shrink: 0;
    }
    .voice-play-btn:active { transform: scale(0.92); }
    .voice-play-btn.playing { animation: pulse 1.2s infinite; }
    .voice-play-icon {
      width: 0; height: 0; border-left: 14px solid white;
      border-top: 9px solid transparent; border-bottom: 9px solid transparent;
      margin-left: 3px;
    }
    .voice-play-btn.playing .voice-play-icon {
      width: 12px; height: 12px; border: none;
      background: white; border-radius: 2px;
    }
    .voice-wave {
      display: flex; gap: 3px; align-items: flex-end; height: 30px;
    }
    .voice-wave span {
      width: 3px; background: #faa2c1; border-radius: 2px;
      animation: wave 1.2s infinite ease-in-out;
    }
    .voice-wave span:nth-child(1) { height: 15px; animation-delay: 0s; }
    .voice-wave span:nth-child(2) { height: 24px; animation-delay: 0.2s; }
    .voice-wave span:nth-child(3) { height: 18px; animation-delay: 0.4s; }
    .voice-wave span:nth-child(4) { height: 26px; animation-delay: 0.6s; }
    @keyframes wave {
      0%,100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer"></div>

  <script>
    // ========== 🔑 当前有效密码（改这里即可） ==========
    const CURRENT_PASSWORD = 'hehao2024';
    // ==================================================

    const firebaseConfig = {
      databaseURL: "https://sorry-capsule-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (token) {
      initReceiver(token);
    } else {
      initPasswordGate();
    }

    // ========== 密码验证门 ==========
    function initPasswordGate() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <h1>🔐 验证你的胶囊</h1>
        <p class="sub-title">请输入购买后获得的专属密码</p>
        <input type="password" class="password-input" id="passwordInput" placeholder="请输入密码">
        <p class="error-msg" id="errorMsg">❌ 密码错误</p>
        <button class="btn" id="verifyBtn">🔓 验证进入</button>
        <p class="note">💡 密码由卖家提供，请勿外传</p>
      `;
      document.getElementById('verifyBtn').addEventListener('click', () => {
        const inputPwd = document.getElementById('passwordInput').value.trim();
        if (inputPwd === CURRENT_PASSWORD) {
          initSender();
        } else {
          document.getElementById('errorMsg').style.display = 'block';
          document.getElementById('passwordInput').value = '';
        }
      });
      document.getElementById('passwordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('verifyBtn').click();
      });
    }

    // ========== 图片压缩 ==========
    function compressImage(file, maxWidth = 600, quality = 0.6) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ========== 发起方制作页面 ==========
    function initSender() {
      const container = document.getElementById('mainContainer');
      container.innerHTML = `
        <h1>📸 制作和好胶囊</h1>
        <p class="sub-title">定制一份专属于TA的回忆</p>
        <input type="text" class="input-field" id="nicknameInput" placeholder="💝 输入TA的昵称（必填，会显示在胶囊顶部）" maxlength="20">
        <div class="upload-area" id="uploadTrigger">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">点击选择照片 (2-100张)</div>
          <div class="upload-count" id="uploadCount">已选 0 张</div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
        <div class="preview-grid" id="previewGrid"></div>

        <div class="message-section">
          <label class="message-label">💬 想对TA说的话（选填）</label>
          <textarea class="message-textarea" id="messageInput" placeholder="对不起，那天是我太冲动了..." maxlength="200"></textarea>
          <div class="char-count"><span id="charCount">0</span>/200</div>
        </div>

        <div class="voice-section">
          <label class="message-label">🎙️ 语音留言（选填，最长60秒）</label>
          <div class="voice-row">
            <button class="voice-btn" id="voiceBtn">🎤 按住录音</button>
            <span id="voiceActions" style="display:none;"></span>
          </div>
          <div class="voice-status" id="voiceStatus"></div>
        </div>

        <label class="message-label">🎵 选择背景音乐</label>
        <div class="music-row">
          <select class="select-field" id="musicSelect">
            <option value="none">🔇 无音乐</option>
            <option value="melody1" selected>🎹 舒缓钢琴 · 回忆</option>
            <option value="melody2">🎻 温暖弦乐 · 守候</option>
          </select>
          <button class="preview-btn" id="previewMusicBtn">▶ 试听</button>
        </div>

        <label class="message-label">❓ 设置一个只有TA知道答案的问题（选填）</label>
        <input type="text" class="input-field" id="questionInput" placeholder="比如：我们第一次约会是在哪里？" maxlength="100">
        <input type="text" class="input-field" id="answerInput" placeholder="答案（对方需输入正确才能看到原谅按钮）" maxlength="50">

        <button class="btn" id="generateBtn" disabled>🔗 生成专属链接</button>
        <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText"></div>
        <p class="note">💡 昵称和照片为必填项，照片最多100张，生成链接可能需要几秒</p>
      `;

      const fileInput = document.getElementById('fileInput');
      const uploadTrigger = document.getElementById('uploadTrigger');
      const previewGrid = document.getElementById('previewGrid');
      const uploadCount = document.getElementById('uploadCount');
      const generateBtn = document.getElementById('generateBtn');
      const messageInput = document.getElementById('messageInput');
      const charCount = document.getElementById('charCount');
      const nicknameInput = document.getElementById('nicknameInput');
      const musicSelect = document.getElementById('musicSelect');
      const questionInput = document.getElementById('questionInput');
      const answerInput = document.getElementById('answerInput');
      const previewMusicBtn = document.getElementById('previewMusicBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const statusText = document.getElementById('statusText');
      const voiceBtn = document.getElementById('voiceBtn');
      const voiceStatus = document.getElementById('voiceStatus');
      const voiceActions = document.getElementById('voiceActions');

      let selectedFiles = [], audioCtx = null, previewInterval = null;
      let voiceBase64 = null;
      let mediaRecorder = null;
      let audioChunks = [];

      function checkGenerateBtn() {
        const nicknameFilled = nicknameInput.value.trim().length > 0;
        const photosValid = selectedFiles.length >= 2;
        generateBtn.disabled = !(nicknameFilled && photosValid);
      }

      nicknameInput.addEventListener('input', checkGenerateBtn);
      messageInput.addEventListener('input', () => { charCount.textContent = messageInput.value.length; });

      // 录音
      voiceBtn.addEventListener('touchstart', startRec); voiceBtn.addEventListener('mousedown', startRec);
      voiceBtn.addEventListener('touchend', stopRec); voiceBtn.addEventListener('mouseup', stopRec);
      voiceBtn.addEventListener('touchcancel', stopRec); voiceBtn.addEventListener('mouseleave', stopRec);

      function startRec(e) {
        e.preventDefault();
        if (!navigator.mediaDevices?.getUserMedia) { alert('浏览器不支持录音，请用文字留言'); return; }
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          mediaRecorder = new MediaRecorder(stream); audioChunks = [];
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = () => {
              voiceBase64 = reader.result;
              voiceStatus.textContent = '✅ 已录制，可回放或重录';
              voiceActions.innerHTML = '<button class="replay-btn" id="replayVoiceBtn">🔊 回放</button> <button class="replay-btn" id="rerecordBtn">🔄 重录</button>';
              document.getElementById('replayVoiceBtn').addEventListener('click', () => { new Audio(voiceBase64).play(); });
              document.getElementById('rerecordBtn').addEventListener('click', () => {
                voiceBase64 = null; voiceActions.innerHTML = ''; voiceStatus.textContent = ''; voiceBtn.style.display = 'inline-block';
              });
              voiceBtn.style.display = 'none';
              voiceActions.style.display = 'inline';
            };
            reader.readAsDataURL(blob);
          };
          mediaRecorder.start();
          voiceBtn.classList.add('recording'); voiceBtn.textContent = '🎤 松开结束录音'; voiceStatus.textContent = '🔴 正在录音...';
          setTimeout(() => { if (mediaRecorder?.state === 'recording') stopRec(); }, 60000);
        }).catch(() => alert('无法访问麦克风，请用文字留言'));
      }
      function stopRec() {
        if (mediaRecorder?.state === 'recording') { mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t => t.stop()); }
        voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤 按住录音';
        if (!voiceBase64) voiceStatus.textContent = '';
      }

      uploadTrigger.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        selectedFiles = files.slice(0, 100);
        uploadCount.textContent = '已选 ' + selectedFiles.length + ' 张';
        previewGrid.innerHTML = '';
        const previewCount = Math.min(selectedFiles.length, 20);
        for (let i = 0; i < previewCount; i++) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'preview-thumb';
            previewGrid.appendChild(img);
          };
          reader.readAsDataURL(selectedFiles[i]);
        }
        if (selectedFiles.length > 20) {
          const more = document.createElement('div');
          more.style.cssText = 'grid-column: span 2; font-size: 12px; color: #e6739f; text-align: center;';
          more.textContent = '...还有 ' + (selectedFiles.length - 20) + ' 张';
          previewGrid.appendChild(more);
        }
        checkGenerateBtn();
      });

      // 音乐试听
      function stopPreview() { if (previewInterval) { clearInterval(previewInterval); previewInterval = null; } if (audioCtx) { audioCtx.close(); audioCtx = null; } previewMusicBtn.textContent = '▶ 试听'; }
      previewMusicBtn.addEventListener('click', () => {
        if (previewInterval) { stopPreview(); return; }
        const selectedMusic = musicSelect.value;
        if (selectedMusic === 'none') { alert('请先选择一首音乐'); return; }
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = { melody1: [523,659,784,1047,784,659,523,440], melody2: [392,440,523,659,523,440,392,330] }[selectedMusic] || [];
          let noteIndex = 0;
          function playNote() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = notes[noteIndex % notes.length];
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 1.2);
            noteIndex++;
          }
          playNote();
          previewMusicBtn.textContent = '⏹ 停止';
          previewInterval = setInterval(playNote, 1800);
          setTimeout(() => { if (previewInterval) stopPreview(); }, 5000);
        } catch(e) { alert('试听失败，但音乐仍会包含在胶囊中'); stopPreview(); }
      });

      generateBtn.addEventListener('click', async () => {
        if (selectedFiles.length < 2 || !nicknameInput.value.trim()) return;
        generateBtn.style.display = 'none';
        progressBar.style.display = 'block';
        statusText.textContent = '正在压缩图片...';

        const imagesBase64 = [];
        const total = selectedFiles.length;
        const batchSize = 10;
        for (let i = 0; i < total; i += batchSize) {
          const batch = selectedFiles.slice(i, i + batchSize);
          const batchResults = await Promise.all(batch.map(file => compressImage(file, 600, 0.6)));
          imagesBase64.push(...batchResults);
          const progress = Math.round(((i + batch.length) / total) * 100);
          progressFill.style.width = progress + '%';
          statusText.textContent = `已压缩 ${Math.min(i + batch.length, total)}/${total} 张...`;
        }

        statusText.textContent = '正在上传到云端...';
        const capsuleData = {
          nickname: nicknameInput.value.trim(),
          message: messageInput.value.trim() || '',
          voice: voiceBase64 || null,
          music: musicSelect.value,
          question: questionInput.value.trim() || '',
          answer: answerInput.value.trim() || '',
          images: imagesBase64,
          viewed: false
        };

        const newRef = db.ref('capsules').push();
        await newRef.set(capsuleData);
        const token = newRef.key;
        const link = window.location.href.split('?')[0] + '?token=' + token;

        let createdTokens = JSON.parse(localStorage.getItem('created_tokens') || '[]');
        createdTokens.push(token);
        localStorage.setItem('created_tokens', JSON.stringify(createdTokens));

        container.innerHTML = `
          <h1>✅ 胶囊生成成功！</h1>
          <p style="color:#666; margin: 15px 0;">专属链接已准备好，发给TA即可</p>
          <div style="background:#f8f0f3; border-radius:16px; padding:15px; word-break:break-all; font-size:12px; color:#d6336c; margin:15px 0;">${link}</div>
          <button class="btn" id="copyBtn">📋 一键复制链接</button>
          <p id="viewStatus" style="color:#e6739f; margin-top:15px; font-weight:600;">⏳ 等待TA打开...</p>
          <p class="note">💡 对方点击“原谅”后，云端数据将自动删除，但TA的手机上将永久保留这份回忆</p>
        `;

        db.ref('capsules/' + token + '/viewed').on('value', snap => {
          if (snap.val() === true) {
            const vs = document.getElementById('viewStatus');
            if (vs) vs.textContent = '✅ TA已打开胶囊';
          }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
          if (navigator.clipboard) {
            navigator.clipboard.writeText(link).then(() => alert('链接已复制！快去发给TA吧 💕'));
          } else {
            const ta = document.createElement('textarea'); ta.value = link; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            alert('链接已复制！快去发给TA吧 💕');
          }
        });
      });
    }

    // ========== 接收方入口 ==========
    function initReceiver(token) {
      const container = document.getElementById('mainContainer');
      const createdTokens = JSON.parse(localStorage.getItem('created_tokens') || '[]');
      if (createdTokens.includes(token)) {
        buildSenderPreview(token);
        return;
      }

      container.innerHTML = '<h1>⏳ 加载中...</h1><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>';

      const localDataKey = 'capsule_local_' + token;
      const localData = localStorage.getItem(localDataKey);
      if (localData) {
        const data = JSON.parse(localData);
        buildMemorialUI(data);
        return;
      }

      const progressFill = document.getElementById('progressFill');
      let progress = 0;
      const progressTimer = setInterval(() => {
        progress += 15; if (progress > 90) progress = 90;
        if (progressFill) progressFill.style.width = progress + '%';
      }, 300);

      db.ref('forgiven/' + token).once('value').then(snapshot => {
        if (snapshot.exists()) {
          db.ref('capsules/' + token).once('value').then(capSnapshot => {
            clearInterval(progressTimer);
            const data = capSnapshot.val();
            if (data) {
              localStorage.setItem(localDataKey, JSON.stringify(data));
              if (progressFill) progressFill.style.width = '100%';
              setTimeout(() => buildMemorialUI(data), 300);
            } else {
              container.innerHTML = '<h1>😔</h1><p class="error-text">这个链接已经失效了</p>';
            }
          });
        } else {
          db.ref('capsules/' + token).once('value').then(capSnapshot => {
            clearInterval(progressTimer);
            const data = capSnapshot.val();
            if (!data) {
              container.innerHTML = '<h1>😔</h1><p class="error-text">这个链接已经失效了</p>';
              return;
            }
            if (data.viewed !== true) {
              db.ref('capsules/' + token + '/viewed').set(true);
            }
            if (progressFill) progressFill.style.width = '100%';
            setTimeout(() => buildReceiverUI(data, token, localDataKey), 300);
          });
        }
      }).catch(() => {
        clearInterval(progressTimer);
        container.innerHTML = '<h1>😔</h1><p class="error-text">加载失败，请检查网络后重试</p>';
      });
    }

    // ========== 通用辅助函数 ==========
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[m]);
    }

    function buildEnvelopeHTML(message) {
      return `<div class="envelope-container" id="envelopeContainer"><div class="envelope-body"></div><div class="envelope-flap" id="envelopeFlap"></div><div class="envelope-seal" id="envelopeSeal">💌</div><div class="letter-paper" id="letterPaper"><div class="letter-text">${escapeHtml(message)}</div></div></div><p class="sub-title">点击信封，拆开看看</p>`;
    }

    function playSlideshow(images, music, contentArea, callback) {
      let audioCtx = null, musicPlaying = false;
      function startMusic() {
        if (music === 'none' || musicPlaying) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = { melody1: [523,659,784,1047,784,659,523,440,523,659,784,659,523,440,392,440,523,392,440,523,659,523,440,392,330,392,440], melody2: [392,440,523,392,440,523,659,523,440,392,330,392,440,330,392,440,523,440,392,330,294,330,392] }[music] || [];
          let ni = 0;
          function p() { if (!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'sine'; o.frequency.value = notes[ni%notes.length]; g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 1.5); ni++; }
          p(); musicPlaying = true; window._musicInterval = setInterval(p, 2200);
        } catch(e) {}
      }
      function stopMusic() { if (window._musicInterval) clearInterval(window._musicInterval); if (audioCtx) audioCtx.close(); musicPlaying = false; }

      contentArea.innerHTML = `<div class="slideshow-viewer" id="slideshowViewer">${images.map((src, i) => `<img src="${src}" class="${i === 0 ? 'active' : ''}">`).join('')}</div><p class="sub-title" id="slideshowHint">回忆缓缓展开...</p>`;
      startMusic();
      const imgs = document.querySelectorAll('.slideshow-viewer img');
      const hint = document.getElementById('slideshowHint');
      let current = 0; const total = imgs.length;
      const phrases = ['这些画面，你还记得吗...', '每一个瞬间，都是真的...', '回忆不会说谎...', '那时候的我们，多好啊...', 'TA一直记得...'];
      function nextSlide() {
        imgs[current].classList.remove('active'); current++;
        if (current < total) {
          imgs[current].classList.add('active');
          if (hint && phrases[current-1]) hint.textContent = phrases[current-1];
          window._slideTimer = setTimeout(nextSlide, 3500);
        } else {
          if (hint) hint.textContent = '回忆播完了，但那些美好从未离开';
          stopMusic();
          if (callback) setTimeout(callback, 800);
        }
      }
      window._slideTimer = setTimeout(nextSlide, 3500);
    }

    function showLetterStep(message, contentArea, callback) {
      contentArea.innerHTML = buildEnvelopeHTML(message);
      const flap = document.getElementById('envelopeFlap');
      const paper = document.getElementById('letterPaper');
      const seal = document.getElementById('envelopeSeal');
      document.getElementById('envelopeContainer').addEventListener('click', () => {
        if (flap.classList.contains('open')) return;
        flap.classList.add('open');
        paper.classList.add('show');
        // 印章淡出
        setTimeout(() => {
          if (seal) seal.classList.add('hidden');
        }, 600);
        // 继续按钮
        setTimeout(() => {
          const btn = document.createElement('button');
          btn.className = 'btn'; btn.textContent = '继续'; btn.style.marginTop = '20px';
          contentArea.appendChild(btn);
          btn.addEventListener('click', () => { if (callback) callback(); });
        }, 1500);
      });
    }

    function showVoiceStep(voice, contentArea, callback) {
      contentArea.innerHTML = `
        <h1>🎙️ TA还给你录了一段话</h1>
        <div class="voice-player-wrapper">
          <button class="voice-play-btn" id="voicePlayBtn"><div class="voice-play-icon"></div></button>
          <div class="voice-wave"><span></span><span></span><span></span><span></span></div>
        </div>
        <audio id="voiceAudio" src="${voice}" style="display:none;"></audio>
        <button class="btn" id="voiceContinueBtn" style="margin-top:25px;">继续</button>
      `;

      const audio = document.getElementById('voiceAudio');
      const playBtn = document.getElementById('voicePlayBtn');

      playBtn.addEventListener('click', () => {
        if (audio.paused) {
          audio.play();
          playBtn.classList.add('playing');
        } else {
          audio.pause();
          playBtn.classList.remove('playing');
        }
      });
      audio.addEventListener('ended', () => {
        playBtn.classList.remove('playing');
      });

      document.getElementById('voiceContinueBtn').addEventListener('click', () => {
        audio.pause();
        if (callback) callback();
      });
    }

    // ========== 接收方正常流程 ==========
    function buildReceiverUI(data, token, localDataKey) {
      const container = document.getElementById('mainContainer');
      const { nickname, message, music, question, answer, images, voice } = data;
      const hasMsg = message && message.trim().length > 0;
      const hasVoice = voice && voice.length > 0;
      const hasQuiz = question && answer && question.trim().length > 0 && answer.trim().length > 0;

      container.innerHTML = `<div class="nickname-bar">💝 专属于 ${escapeHtml(nickname)} 的胶囊</div><div id="contentArea"></div>`;
      const contentArea = document.getElementById('contentArea');

      contentArea.innerHTML = `<h1>💊 你收到一颗和好胶囊</h1><div class="start-card"><div class="start-emoji">🕊️</div><div class="start-desc">${escapeHtml(nickname)}，这份回忆是专门为你准备的。<br>希望能和你重新开始。<br>准备好了吗？</div><button class="btn" id="startBtn">📽️ 打开胶囊，看看回忆</button></div>`;
      document.getElementById('startBtn').addEventListener('click', () => {
        playSlideshow(images, music, contentArea, () => {
          if (hasMsg) { showLetterStep(message, contentArea, () => afterLetter()); }
          else { afterLetter(); }
        });
      });

      function afterLetter() {
        if (hasVoice) { showVoiceStep(voice, contentArea, afterVoice); }
        else { afterVoice(); }
      }
      function afterVoice() {
        if (hasQuiz) { showQuiz(); }
        else { showCoupon(); }
      }

      function showQuiz() {
        contentArea.innerHTML = `<h1>❓ 在原谅之前...</h1><p style="color:#666;margin:15px 0;">${escapeHtml(question)}</p><input type="text" class="quiz-input" id="quizAnswer" placeholder="请输入你的答案"><p class="quiz-error" id="quizError">答案不对哦 💭</p><button class="btn" id="quizBtn">✅ 确认答案</button>`;
        document.getElementById('quizBtn').addEventListener('click', () => {
          if (document.getElementById('quizAnswer').value.trim() === answer) { showCoupon(); }
          else { document.getElementById('quizError').style.display = 'block'; }
        });
      }

      function showCoupon() {
        contentArea.innerHTML = `<h1>💊 和好胶囊</h1><div class="coupon-card"><div class="coupon-title">专属和好券</div><div class="coupon-desc">看完我们的回忆，<br>你愿意给彼此一个重新开始的机会吗？</div><button class="forgive-btn" id="forgiveBtn">💖 原谅TA，点击和好</button></div>`;
        document.getElementById('forgiveBtn').addEventListener('click', async () => {
          localStorage.setItem(localDataKey, JSON.stringify(data));
          await db.ref('forgiven/' + token).set(true);
          await db.ref('capsules/' + token).remove();
          contentArea.innerHTML = `<h1>🌸</h1><div class="forgiven-msg">和好成功！<br>你们已经和好如初啦 💕</div><p style="color:#666;margin-top:15px;">这份回忆将永远为你留存</p><button class="memorial-btn" id="memorialBtn">📽️ 再次播放回忆</button>`;
          document.getElementById('memorialBtn').addEventListener('click', () => { buildMemorialUI(data); });
        });
      }
      window.addEventListener('beforeunload', () => { if (window._slideTimer) clearTimeout(window._slideTimer); });
    }

    // ========== 预览模式 ==========
    function buildSenderPreview(token) {
      const container = document.getElementById('mainContainer');
      container.innerHTML = '<h1>🔍 加载预览中...</h1>';
      db.ref('capsules/' + token).once('value').then(snapshot => {
        const data = snapshot.val();
        if (!data) { container.innerHTML = '<h1>😔</h1><p class="error-text">链接已失效</p>'; return; }
        const { nickname, message, music, images, voice, viewed } = data;
        const hasMsg = message && message.trim().length > 0;
        const hasVoice = voice && voice.length > 0;

        container.innerHTML = `<div class="nickname-bar">💝 专属于 ${escapeHtml(nickname)} 的胶囊（预览）${viewed ? ' · 对方已读' : ''}</div><h1>📸 胶囊预览</h1><p style="color:#666;">这是你制作的胶囊，对方将看到以下内容</p><div id="contentArea"></div>`;
        const contentArea = document.getElementById('contentArea');

        contentArea.innerHTML = `<div class="start-card"><div class="start-emoji">🕊️</div><div class="start-desc">这份回忆希望能重新开始。</div><button class="btn" id="previewStartBtn">📽️ 预览播放</button></div>`;
        document.getElementById('previewStartBtn').addEventListener('click', () => {
          playSlideshow(images, music, contentArea, () => {
            if (hasMsg) { showLetterStep(message, contentArea, () => afterLetter()); }
            else { afterLetter(); }
          });
        });

        function afterLetter() {
          if (hasVoice) { showVoiceStep(voice, contentArea, afterVoice); }
          else { afterVoice(); }
        }
        function afterVoice() {
          contentArea.innerHTML = '<h1>✅ 预览结束</h1><p style="color:#666;">这就是对方将看到的完整内容。真正的“原谅”按钮只会出现在TA的链接里。</p>';
        }
      });
    }

    // ========== 纪念册模式 ==========
    function buildMemorialUI(data) {
      const container = document.getElementById('mainContainer');
      const { nickname, message, music, images, voice } = data;
      const hasMsg = message && message.trim().length > 0;
      const hasVoice = voice && voice.length > 0;

      container.innerHTML = `<div class="nickname-bar">💝 专属于 ${escapeHtml(nickname)} 的和好纪念册</div><h1>🌸 和好成功！</h1><p style="color:#666;">这份回忆将永远为你留存</p><div id="contentArea"></div>`;
      const contentArea = document.getElementById('contentArea');

      contentArea.innerHTML = `<div class="start-card"><div class="start-emoji">🕊️</div><div class="start-desc">你们已经和好如初，<br>但这份回忆值得永远珍藏。</div><button class="memorial-btn" id="memorialStartBtn">📽️ 再次播放回忆</button></div>`;
      document.getElementById('memorialStartBtn').addEventListener('click', () => {
        playSlideshow(images, music, contentArea, () => {
          if (hasMsg) { showLetterStep(message, contentArea, () => afterLetter()); }
          else { afterLetter(); }
        });
      });

      function afterLetter() {
        if (hasVoice) { showVoiceStep(voice, contentArea, afterVoice); }
        else { afterVoice(); }
      }
      function afterVoice() {
        contentArea.innerHTML = '<h1>💕</h1><p style="color:#666;">这些回忆，永远属于你们。</p>';
      }
    }
  </script>
</body>
</html>
