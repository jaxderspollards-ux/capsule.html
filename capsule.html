<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💊 和好胶囊 · 制作</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #ffe0f0 50%, #f8d7e6 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 420px; width: 100%;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(20px);
      border-radius: 40px; box-shadow: 0 25px 50px rgba(255,105,135,0.2);
      padding: 30px 25px; text-align: center;
    }
    h1 { font-size: 24px; color: #d6336c; margin-bottom: 5px; font-weight: 700; }
    .sub-title { font-size: 14px; color: #e6739f; margin-bottom: 20px; }

    .upload-area {
      border: 2px dashed #faa2c1; border-radius: 24px; padding: 30px 20px;
      background: rgba(255,218,224,0.3); cursor: pointer; margin-bottom: 15px;
    }
    .upload-icon { font-size: 48px; margin-bottom: 10px; }
    .upload-text { color: #d6336c; font-size: 15px; font-weight: 500; }
    .preview-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
    .preview-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    .message-section { margin: 20px 0; text-align: left; }
    .message-label { font-size: 15px; color: #d6336c; font-weight: 600; margin-bottom: 8px; display: block; }
    .message-textarea {
      width: 100%; height: 100px; border: 2px solid #faa2c1; border-radius: 16px;
      padding: 12px; font-size: 14px; color: #555; resize: none; outline: none;
      font-family: inherit; background: rgba(255,255,255,0.8);
    }
    .char-count { font-size: 12px; color: #999; text-align: right; margin-top: 4px; }

    .btn {
      background: linear-gradient(135deg, #ff6b9d, #c44569); border: none; color: white;
      padding: 14px 30px; border-radius: 50px; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 20px rgba(255,107,157,0.4);
      width: 100%; margin-top: 10px;
    }
    .btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .note { font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <h1>📸 制作和好胶囊</h1>
    <p class="sub-title">选照片、写心里话，生成一个能发给TA的胶囊文件</p>

    <div class="upload-area" id="uploadTrigger">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击选择照片 (2-8张)</div>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
    <div class="preview-list" id="previewContainer"></div>

    <div class="message-section">
      <label class="message-label">💬 想对TA说的话（选填）</label>
      <textarea class="message-textarea" id="messageInput" placeholder="对不起，那天是我太冲动了..." maxlength="200"></textarea>
      <div class="char-count"><span id="charCount">0</span>/200</div>
    </div>

    <button class="btn" id="generateBtn" disabled>🎁 生成胶囊文件</button>
    <p class="note">💡 文件将保存在你的手机，发给TA即可，无需网络也能看</p>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadTrigger = document.getElementById('uploadTrigger');
    const previewContainer = document.getElementById('previewContainer');
    const generateBtn = document.getElementById('generateBtn');
    const messageInput = document.getElementById('messageInput');
    const charCount = document.getElementById('charCount');

    let selectedFiles = [];

    messageInput.addEventListener('input', () => {
      charCount.textContent = messageInput.value.length;
    });

    uploadTrigger.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      selectedFiles = files.slice(0, 8);
      previewContainer.innerHTML = '';
      selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-thumb';
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
      generateBtn.disabled = false;
    });

    generateBtn.addEventListener('click', async () => {
      if (!selectedFiles.length) return;
      generateBtn.disabled = true;
      generateBtn.textContent = '⏳ 正在打包回忆...';

      const imagesBase64 = [];
      for (let file of selectedFiles) {
        const dataUrl = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
        imagesBase64.push(dataUrl);
      }

      const message = messageInput.value.trim();
      const capsuleHTML = generateCapsuleHTML(imagesBase64, message);

      // 创建下载链接
      const blob = new Blob([capsuleHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '和好胶囊.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      generateBtn.textContent = '✅ 胶囊已下载，快去发给TA';
      generateBtn.disabled = true;
    });

    function generateCapsuleHTML(images, message) {
      const imagesJson = JSON.stringify(images);
      const escapedMessage = message.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
      return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💊 和好胶囊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #ffe0f0 50%, #f8d7e6 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 420px; width: 100%;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(20px);
      border-radius: 40px; box-shadow: 0 25px 50px rgba(255,105,135,0.2);
      padding: 30px 25px; text-align: center;
    }
    h1 { font-size: 24px; color: #d6336c; margin-bottom: 5px; font-weight: 700; }
    .sub-title { font-size: 14px; color: #e6739f; margin-bottom: 20px; }

    .start-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 30px;
      padding: 30px 20px; margin: 20px 0; border: 2px solid #ffb3c6;
    }
    .start-emoji { font-size: 60px; margin-bottom: 15px; }
    .start-desc { color: #666; font-size: 15px; margin: 15px 0; line-height: 1.6; }

    .message-display {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 24px;
      padding: 25px 20px; margin: 20px 0; border: 2px solid #ffb3c6;
    }
    .message-content { font-size: 16px; color: #555; line-height: 1.8; font-style: italic; }

    .film-viewer {
      width: 100%; height: 300px; border-radius: 24px; background: #1a1a1a;
      overflow: hidden; position: relative; margin: 20px 0;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }
    .film-viewer::before, .film-viewer::after {
      content: ''; position: absolute; left: 0; width: 100%; height: 18px;
      background: repeating-linear-gradient(90deg, #222 0px, #222 8px, transparent 8px, transparent 16px);
      z-index: 5; pointer-events: none;
    }
    .film-viewer::before { top: 0; } .film-viewer::after { bottom: 0; }
    .film-strip {
      display: flex; height: 100%; align-items: center; position: absolute; top: 0; left: 0;
      will-change: transform;
    }
    .film-strip img {
      height: 85%; max-height: 250px; width: auto; margin: 0 8px;
      border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      border: 2px solid #ffd1dc; background: #fff; object-fit: cover; min-width: 160px;
    }

    .coupon-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec); border-radius: 30px;
      padding: 30px 20px; margin: 20px 0; border: 2px solid #ffb3c6;
      box-shadow: 0 15px 30px rgba(255,105,135,0.2);
    }
    .coupon-title { font-size: 24px; color: #d6336c; font-weight: 700; margin-bottom: 10px; }
    .coupon-desc { font-size: 15px; color: #555; margin-bottom: 25px; }
    .forgive-btn {
      background: #ff4d6d; font-size: 18px; padding: 15px 35px; border: none; color: white;
      border-radius: 50px; font-weight: 600; letter-spacing: 1px; cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,77,109,0.4); animation: pulse 1.8s infinite;
      width: 80%; margin: 0 auto;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5); }
      70% { box-shadow: 0 0 0 15px rgba(255,77,109,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
    }
    .forgiven-msg {
      font-size: 18px; color: #d6336c; font-weight: 700; margin-top: 20px;
    }
    .btn {
      background: linear-gradient(135deg, #ff6b9d, #c44569); border: none; color: white;
      padding: 14px 30px; border-radius: 50px; font-size: 16px; font-weight: 600;
      cursor: pointer; box-shadow: 0 8px 20px rgba(255,107,157,0.4);
      width: 80%; margin: 20px auto 0; display: block;
    }
    .btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="container" id="mainContainer"></div>
  <script>
    (function() {
      const images = ${imagesJson};
      const message = '${escapedMessage}';
      const hasMsg = message.length > 0;
      const KEY_USED = 'capsule_forgiven';
      const isForgiven = localStorage.getItem(KEY_USED) === 'used';
      
      const container = document.getElementById('mainContainer');
      
      if (isForgiven) {
        // 已经原谅过了，直接展示回忆，不再显示按钮
        container.innerHTML = buildContent(true);
        playFilm();
      } else {
        container.innerHTML = '<div id="startSection"><h1>💊 你收到一颗和好胶囊</h1><div class="start-card"><div class="start-emoji">🕊️</div><div class="start-desc">TA 用心准备了这份回忆，<br>希望能和你重新开始。<br>准备好了吗？</div><button class="btn" id="startBtn">📽️ 打开胶囊，看看回忆</button></div></div>' + '<div id="contentSection" style="display:none;">' + buildContent(false) + '</div>';
        document.getElementById('startBtn').addEventListener('click', function() {
          document.getElementById('startSection').style.display = 'none';
          document.getElementById('contentSection').style.display = 'block';
          initContent(false);
        });
      }
      
      function buildContent(forgiven) {
        let html = '';
        if (hasMsg) {
          html += '<div id="messageSection"><h1>💌 TA想对你说...</h1><div class="message-display"><div class="message-content">' + message.replace(/\\n/g, '<br>') + '</div></div><button class="btn" id="continueBtn">📽️ 继续，看看回忆</button></div>';
        }
        html += '<div id="filmSection" style="display:' + (hasMsg ? 'none' : 'block') + ';"><h1>🎞️ 属于你们的回忆</h1><div class="film-viewer" id="filmViewer"><div class="film-strip" id="filmStrip"></div></div><p class="sub-title" id="filmHint">' + (forgiven ? '这份回忆将永远留存 💕' : '回忆缓缓展开...') + '</p></div>';
        if (!forgiven) {
          html += '<div id="couponSection" style="display:none;"><h1>💊 和好胶囊</h1><div class="coupon-card"><div class="coupon-title">专属和好券</div><div class="coupon-desc">看完我们的回忆，<br>你愿意给彼此一个重新开始的机会吗？</div><button class="forgive-btn" id="forgiveBtn">💖 原谅TA，点击和好</button></div></div>';
        } else {
          html += '<div class="forgiven-msg">🌸 你们已经和好如初啦</div>';
        }
        return html;
      }
      
      function playFilm() {
        const filmStrip = document.getElementById('filmStrip');
        if (!filmStrip || filmStrip.children.length > 0) return;
        images.forEach(function(src) {
          const img = document.createElement('img');
          img.src = src;
          filmStrip.appendChild(img);
        });
        let loaded = 0;
        const imgs = filmStrip.querySelectorAll('img');
        imgs.forEach(function(img) {
          if (img.complete) loaded++;
          else {
            img.addEventListener('load', function() { loaded++; if (loaded === imgs.length) startAnim(); });
            img.addEventListener('error', function() { loaded++; if (loaded === imgs.length) startAnim(); });
          }
        });
        if (loaded === imgs.length) startAnim();
        setTimeout(function() { if (loaded < imgs.length) { loaded = imgs.length; startAnim(); } }, 3000);
      }
      
      function startAnim() {
        const filmStrip = document.getElementById('filmStrip');
        const filmViewer = document.getElementById('filmViewer');
        if (!filmStrip || !filmViewer) return;
        const sw = filmStrip.scrollWidth;
        const vw = filmViewer.clientWidth;
        if (!sw || !vw) { setTimeout(startAnim, 200); return; }
        let dur = images.length * 2.5;
        if (dur < 8) dur = 8;
        if (dur > 25) dur = 25;
        filmStrip.style.transition = 'none';
        filmStrip.style.transform = 'translateX(' + vw + 'px)';
        filmStrip.offsetHeight;
        const filmHint = document.getElementById('filmHint');
        if (filmHint && !isForgiven) filmHint.textContent = '回忆缓缓展开，那些美好从未离开...';
        filmStrip.style.transition = 'transform ' + dur + 's linear';
        filmStrip.style.transform = 'translateX(-' + sw + 'px)';
        setTimeout(function() {
          if (!isForgiven) {
            const couponSection = document.getElementById('couponSection');
            if (couponSection) couponSection.style.display = 'block';
          }
        }, dur * 1000 + 500);
      }
      
      function initContent(forgiven) {
        if (hasMsg) {
          document.getElementById('continueBtn').addEventListener('click', function() {
            document.getElementById('messageSection').style.display = 'none';
            document.getElementById('filmSection').style.display = 'block';
            playFilm();
          });
        } else {
          playFilm();
        }
        if (!forgiven) {
          document.getElementById('forgiveBtn').addEventListener('click', function() {
            localStorage.setItem(KEY_USED, 'used');
            document.getElementById('couponSection').style.display = 'none';
            document.getElementById('filmHint').textContent = '这份回忆将永远留存 💕';
            const msg = document.createElement('div');
            msg.className = 'forgiven-msg';
            msg.textContent = '🌸 你们已经和好如初啦';
            document.getElementById('filmSection').appendChild(msg);
          });
        }
      }
    })();
  <\/script>
</body>
</html>`;
    }
  </script>
</body>
</html>
