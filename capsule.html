<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💊 和好胶囊</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    :root {
      --pink-deep: #c44569;
      --pink-mid: #e05c8a;
      --pink-bright: #ff6b9d;
      --pink-light: #faa2c1;
      --pink-pale: #ffd1dc;
      --pink-bg: #fff0f5;
      --cream: #fffaf8;
      --text-dark: #3a1a28;
      --text-mid: #7a4060;
      --text-light: #b07090;
      --gold: #d4a853;
      --shadow-pink: rgba(196,69,105,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      background: #1a0a10;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    .bg-particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      max-width: 440px; width: 100%;
      background: linear-gradient(160deg, rgba(255,255,255,0.97) 0%, rgba(255,240,248,0.97) 100%);
      backdrop-filter: blur(30px);
      border-radius: 36px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,160,200,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
      padding: 35px 28px;
      text-align: center;
      max-height: 92vh; overflow-y: auto;
      position: relative; z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--pink-pale) transparent;
    }
    .container::-webkit-scrollbar { width: 4px; }
    .container::-webkit-scrollbar-track { background: transparent; }
    .container::-webkit-scrollbar-thumb { background: var(--pink-pale); border-radius: 2px; }

    .container::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink-bright), var(--gold), var(--pink-bright), transparent);
      border-radius: 0 0 2px 2px;
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px; color: var(--pink-deep); margin-bottom: 6px; font-weight: 700;
      letter-spacing: 1px;
    }
    .sub-title { font-size: 13px; color: var(--text-light); margin-bottom: 22px; letter-spacing: 0.5px; }

    .lock-icon {
      width: 72px; height: 72px; margin: 10px auto 20px;
      background: linear-gradient(135deg, var(--pink-bright), var(--pink-deep));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 24px var(--shadow-pink);
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); box-shadow: 0 8px 24px var(--shadow-pink); }
      50% { transform: scale(1.05); box-shadow: 0 12px 32px rgba(196,69,105,0.3); }
    }

    .password-input, .input-field {
      width: 100%; padding: 14px 20px;
      border: 1.5px solid var(--pink-pale);
      border-radius: 50px;
      font-size: 15px; text-align: center;
      color: var(--text-dark);
      background: var(--cream);
      outline: none; margin-bottom: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 2px;
    }
    .password-input:focus, .input-field:focus {
      border-color: var(--pink-bright);
      box-shadow: 0 0 0 3px rgba(255,107,157,0.12);
    }
    .input-field { letter-spacing: 0; }

    .error-msg { color: #e03131; font-size: 13px; margin-top: -8px; margin-bottom: 10px; display: none; }

    .upload-area {
      border: 1.5px dashed var(--pink-light);
      border-radius: 20px; padding: 22px 16px;
      background: rgba(255,209,220,0.15);
      cursor: pointer; margin-bottom: 12px;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .upload-area:hover { border-color: var(--pink-bright); background: rgba(255,107,157,0.08); }
    .upload-area:hover .upload-icon { transform: scale(1.1); }
    .upload-icon { font-size: 36px; margin-bottom: 8px; transition: transform 0.2s; display: block; }
    .upload-text { color: var(--pink-deep); font-size: 14px; font-weight: 500; }
    .upload-count { font-size: 12px; color: var(--text-light); margin-top: 4px; }

    .preview-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      margin: 10px 0; max-height: 220px; overflow-y: auto; padding: 4px;
    }
    .preview-item {
      position: relative; aspect-ratio: 1;
    }
    .preview-thumb {
      width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
      border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: block;
    }
    .preview-delete {
      position: absolute; top: -5px; right: -5px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--pink-deep); color: white;
      border: none; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 2; line-height: 1;
    }

    .message-section { margin: 16px 0; text-align: left; }
    .message-label {
      font-size: 13px; color: var(--pink-deep); font-weight: 600;
      margin-bottom: 8px; display: block; letter-spacing: 0.5px;
    }
    .message-textarea {
      width: 100%; height: 90px;
      border: 1.5px solid var(--pink-pale); border-radius: 16px;
      padding: 12px 14px; font-size: 14px; color: var(--text-dark);
      resize: none; outline: none;
      font-family: inherit;
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }
    .message-textarea:focus {
      border-color: var(--pink-bright);
      box-shadow: 0 0 0 3px rgba(255,107,157,0.1);
    }
    .char-count { font-size: 11px; color: var(--text-light); text-align: right; margin-top: 4px; }

    .voice-section { margin: 16px 0; text-align: left; }
    .voice-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .voice-btn {
      background: var(--cream); border: 1.5px solid var(--pink-light);
      color: var(--pink-deep); padding: 11px 20px; border-radius: 50px;
      font-size: 14px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; font-weight: 500;
      user-select: none; -webkit-user-select: none;
    }
    .voice-btn:hover { border-color: var(--pink-bright); }
    .voice-btn.recording {
      background: linear-gradient(135deg, var(--pink-bright), var(--pink-deep));
      color: white; border-color: transparent;
      animation: recPulse 1s infinite;
    }
    @keyframes recPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
    .voice-status { font-size: 12px; color: var(--text-light); margin-top: 6px; width: 100%; }
    .voice-duration { font-size: 13px; color: var(--pink-deep); font-weight: 600; }
    .replay-btn {
      background: transparent; border: 1.5px solid var(--pink-pale);
      color: var(--pink-deep); padding: 7px 14px; border-radius: 50px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }

    .music-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
    .select-field {
      flex: 1; padding: 11px 16px;
      border: 1.5px solid var(--pink-pale); border-radius: 50px;
      font-size: 13px; color: var(--text-dark); background: var(--cream);
      outline: none; font-family: inherit;
    }
    .preview-btn {
      background: var(--cream); border: 1.5px solid var(--pink-light);
      color: var(--pink-deep); padding: 9px 16px; border-radius: 50px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap; font-family: inherit;
      transition: all 0.2s;
    }
    .preview-btn:hover { border-color: var(--pink-bright); }

    .btn {
      background: linear-gradient(135deg, var(--pink-bright) 0%, var(--pink-deep) 100%);
      border: none; color: white;
      padding: 15px 30px; border-radius: 50px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 8px 24px var(--shadow-pink), 0 2px 6px rgba(0,0,0,0.1);
      width: 100%; margin-top: 12px;
      font-family: inherit; letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn:active { transform: scale(0.97); box-shadow: 0 4px 12px var(--shadow-pink); }
    .btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; color: #aaa; }

    .note { font-size: 11px; color: var(--text-light); margin-top: 16px; line-height: 1.6; }

    .progress-wrap { margin: 14px 0; }
    .progress-bar {
      width: 100%; height: 5px; background: var(--pink-bg);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink-bright), var(--gold), var(--pink-deep));
      background-size: 200% 100%;
      border-radius: 3px; width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s linear infinite;
    }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .progress-label { font-size: 12px; color: var(--text-light); margin-top: 6px; }
    .status-text { font-size: 13px; color: var(--text-light); margin: 8px 0; }

    .nickname-bar {
      background: linear-gradient(135deg, rgba(255,209,220,0.5), rgba(255,107,157,0.15));
      border: 1px solid rgba(255,160,200,0.3);
      border-radius: 50px; padding: 10px 20px; margin-bottom: 20px;
      font-size: 13px; color: var(--pink-deep); font-weight: 600;
      letter-spacing: 0.5px;
    }

    .start-card {
      background: linear-gradient(145deg, #fff8fb, #ffe8f2);
      border-radius: 28px; padding: 28px 22px; margin: 18px 0;
      border: 1px solid rgba(255,160,200,0.3);
      box-shadow: 0 4px 20px rgba(196,69,105,0.08);
    }
    .start-emoji { font-size: 52px; margin-bottom: 12px; display: block; }
    .start-desc { color: var(--text-mid); font-size: 14px; margin: 10px 0 18px; line-height: 1.8; }

    .envelope-wrapper { 
      position: relative; margin: 30px auto 10px; 
      min-height: 310px; display: flex; justify-content: center; align-items: flex-end; 
    }
    .envelope-container {
      position: relative; width: 280px; height: 180px; cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: gentleFloat 3.5s ease-in-out infinite;
      filter: drop-shadow(0 15px 25px rgba(196,69,105,0.15));
      will-change: transform;
    }
    .envelope-container.is-open {
      animation: none;
      transform: translateY(15px) scale(0.96);
      cursor: default;
    }
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .envelope-back {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #e6cdb3, #f2e2ce);
      border-radius: 8px;
    }
    
    .envelope-front {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none; border-radius: 8px;
    }
    .env-left {
      position: absolute; left: 0; top: 0; width: 50%; height: 100%;
      background: linear-gradient(to right, #fdf5eb, #f2e1cc);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }
    .env-right {
      position: absolute; right: 0; top: 0; width: 50%; height: 100%;
      background: linear-gradient(to left, #fdf5eb, #f2e1cc);
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }
    .env-bottom {
      position: absolute; left: 0; bottom: 0; width: 100%; height: 65%;
      background: linear-gradient(to top, #fffdf8, #faeedb);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }
    
    .envelope-flap {
      position: absolute; top: 0; left: 0; width: 100%; height: 62%;
      background: linear-gradient(to bottom, #fffdf8, #efe0cb);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s 0.35s;
      z-index: 4;
      border-radius: 8px 8px 0 0;
      will-change: transform;
    }
    .envelope-flap.open {
      transform: rotateX(180deg);
      z-index: 1;
    }
    
    .envelope-seal {
      position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--pink-bright), var(--pink-deep));
      border-radius: 50%; z-index: 5;
      box-shadow: 0 6px 16px rgba(196,69,105,0.3), inset 0 2px 4px rgba(255,255,255,0.3);
      display: flex; justify-content: center; align-items: center;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .seal-inner {
      width: 36px; height: 36px; border: 1.5px dashed rgba(255,255,255,0.6);
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      font-size: 18px; color: white;
    }
    .envelope-seal.broken {
      transform: translate(-50%, -50%) scale(1.4);
      opacity: 0;
    }
    
    .letter-paper {
      position: absolute; bottom: 8px; left: 12px; right: 12px;
      height: 160px;
      background: #fffdfa linear-gradient(135deg, rgba(255,240,245,0.4), transparent);
      border: 1px solid rgba(255,182,193,0.3);
      border-radius: 6px;
      padding: 24px 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      transition: all 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 2;
      display: flex; flex-direction: column;
    }
    .letter-paper.show {
      transform: translateY(-110px);
      max-height: 240px;
      box-shadow: 0 12px 35px rgba(196,69,105,0.18);
    }
    .letter-deco { position: absolute; top: 12px; right: 14px; font-size: 16px; opacity: 0.8; }
    .letter-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px; color: #5a3c43; line-height: 1.9;
      opacity: 0; transition: opacity 0.8s ease 0.5s;
      overflow-y: auto; scrollbar-width: thin;
      scrollbar-color: rgba(196,69,105,0.2) transparent;
      flex: 1; text-align: justify;
      margin-top: 10px;
      padding-right: 5px;
    }
    .letter-text::-webkit-scrollbar { width: 4px; }
    .letter-text::-webkit-scrollbar-track { background: transparent; }
    .letter-text::-webkit-scrollbar-thumb { background: rgba(196,69,105,0.2); border-radius: 2px; }
    .letter-paper.show .letter-text { opacity: 1; }
    
    .envelope-hint {
      position: absolute; bottom: -35px; left: 0; width: 100%;
      font-size: 13px; color: var(--text-light); text-align: center;
      transition: opacity 0.4s; letter-spacing: 1px;
    }
    .envelope-container.is-open .envelope-hint { opacity: 0; }

    .slideshow-viewer {
      width: 100%; height: 300px; border-radius: 20px;
      background: #0d0608; overflow: hidden; position: relative;
      margin: 16px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 0 60px rgba(0,0,0,0.5);
      display: flex; justify-content: center; align-items: center;
    }
    .slideshow-viewer img {
      position: absolute; width: 88%; height: auto; max-height: 270px;
      object-fit: contain; border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.05);
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .slideshow-viewer img.active { opacity: 1; }
    .slide-counter {
      position: absolute; bottom: 10px; right: 14px;
      font-size: 11px; color: rgba(255,255,255,0.5);
      letter-spacing: 1px; z-index: 2;
    }
    .slide-phrase {
      position: absolute; bottom: 10px; left: 14px;
      font-size: 11px; color: rgba(255,200,200,0.7);
      font-family: 'Noto Serif SC', serif;
      letter-spacing: 0.5px; z-index: 2;
      max-width: 70%;
      text-align: left;
    }

    .quiz-input {
      width: 82%; padding: 13px 20px;
      border: 1.5px solid var(--pink-pale); border-radius: 50px;
      font-size: 15px; text-align: center; color: var(--text-dark);
      background: var(--cream); outline: none;
      margin: 12px auto; display: block; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .quiz-input:focus { border-color: var(--pink-bright); box-shadow: 0 0 0 3px rgba(255,107,157,0.1); }
    .quiz-error { color: #e03131; font-size: 13px; margin-top: 5px; display: none; }

    .coupon-card {
      background: linear-gradient(145deg, #fff5f8, #ffe0ec);
      border-radius: 28px; padding: 28px 22px; margin: 16px 0;
      border: 1px solid rgba(255,160,200,0.4);
      box-shadow: 0 12px 40px rgba(255,105,135,0.15);
      position: relative; overflow: hidden;
    }
    .coupon-card::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(255,107,157,0.15), transparent 70%);
      border-radius: 50%;
    }
    .coupon-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; color: var(--pink-deep); font-weight: 700; margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .coupon-desc { font-size: 14px; color: var(--text-mid); margin-bottom: 22px; line-height: 1.8; }
    .forgive-btn {
      background: linear-gradient(135deg, #ff4d6d, var(--pink-deep));
      font-size: 17px; padding: 16px 36px;
      border: none; color: white; border-radius: 50px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,77,109,0.4);
      animation: forgivePulse 2s ease-in-out infinite;
      width: 82%; display: block; margin: 0 auto;
      font-family: inherit;
      position: relative; overflow: hidden;
    }
    .forgive-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    }
    @keyframes forgivePulse {
      0% { box-shadow: 0 0 0 0 rgba(255,77,109,0.5), 0 8px 24px rgba(255,77,109,0.3); }
      70% { box-shadow: 0 0 0 16px rgba(255,77,109,0), 0 8px 24px rgba(255,77,109,0.3); }
      100% { box-shadow: 0 0 0 0 rgba(255,77,109,0), 0 8px 24px rgba(255,77,109,0.3); }
    }
    .forgiven-msg {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; color: var(--pink-deep); font-weight: 700; margin-top: 20px;
      line-height: 1.6; letter-spacing: 1px;
    }
    .memorial-btn {
      background: linear-gradient(135deg, var(--pink-pale), var(--pink-light));
      border: none; color: var(--pink-deep);
      padding: 14px 30px; border-radius: 50px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      box-shadow: 0 6px 18px rgba(255,107,157,0.15);
      width: 80%; margin: 20px auto 0; display: block;
      font-family: inherit; transition: transform 0.2s;
    }
    .memorial-btn:active { transform: scale(0.97); }

    .error-text { color: var(--text-light); font-size: 14px; margin: 20px 0; }

    .voice-player-wrapper {
      display: flex; align-items: center; gap: 14px; justify-content: center;
      background: linear-gradient(135deg, rgba(255,209,220,0.3), rgba(255,107,157,0.1));
      border: 1px solid rgba(255,160,200,0.3);
      border-radius: 60px; padding: 16px 28px;
      margin: 22px auto; max-width: 270px;
    }
    .voice-play-btn {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-bright), var(--pink-deep));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px var(--shadow-pink);
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .voice-play-btn:active { transform: scale(0.92); }
    .voice-play-btn.playing { animation: recPulse 1.2s infinite; }
    .voice-play-icon {
      width: 0; height: 0;
      border-left: 15px solid white;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 3px;
    }
    .voice-play-btn.playing .voice-play-icon {
      width: 13px; height: 13px; border: none;
      background: white; border-radius: 2px; margin-left: 0;
    }
    .voice-wave { display: flex; gap: 3px; align-items: flex-end; height: 30px; }
    .voice-wave span {
      width: 3px; background: var(--pink-light); border-radius: 2px;
      animation: waveAnim 1.3s ease-in-out infinite;
    }
    .voice-wave span:nth-child(1) { height: 14px; animation-delay: 0s; }
    .voice-wave span:nth-child(2) { height: 24px; animation-delay: 0.2s; }
    .voice-wave span:nth-child(3) { height: 18px; animation-delay: 0.4s; }
    .voice-wave span:nth-child(4) { height: 26px; animation-delay: 0.6s; }
    @keyframes waveAnim {

<body>

    <script>
    // ============================================================
    // 密码验证方案说明：
    // 1. 前端不再硬编码密码，改为在 Firebase 的 valid_passwords_hashed 节点存储密码的 SHA-256 哈希。
    // 2. 用户输入密码后，前端使用 Web Crypto API 计算 SHA-256，再查询数据库是否存在对应节点。
    // 3. 请务必在 Firebase 控制台更新安全规则（详见文件末尾注释）。
    // ============================================================

    const firebaseConfig = { databaseURL: "https://sorry-capsule-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const _fbDb = firebase.database();

    // ===================== State 对象 =====================
    const State = {
      _data: {
        currentToken: null,
        currentTheme: 'pink',
        localKey: null,
        selectedFiles: [],
        voiceBase64: null,
        mediaRecorder: null,
        audioChunks: [],
        audioCtx: null,
        recTimerInterval: null,
        recSeconds: 0,
        isRecording: false,
        previewInterval: null,
        activeTimers: [],
        activeListeners: [],
        thumbnailCache: []
      },
      get(key) { return this._data[key]; },
      set(key, val) { this._data[key] = val; return val; },
      push(key, val) { this._data[key].push(val); return val; }
    };

    // ===================== Utils 对象 =====================
    const Utils = {
      escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
      },

      // 计算 SHA-256 哈希（返回十六进制字符串）
      async sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
      },

      compressImage(file, maxWidth = 600, quality = 0.6, maxHeight = 800) {
        return new Promise((resolve) => {
          const supportsWorker = typeof Worker !== 'undefined' && typeof OffscreenCanvas !== 'undefined';
          if (supportsWorker) {
            const workerCode = `
              self.onmessage = function(e) {
                const { dataUrl, maxWidth, maxHeight, quality } = e.data;
                const img = new Image();
                img.onload = function() {
                  let w = img.width, h = img.height;
                  if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                  if (h > maxHeight) { w = (w * maxHeight) / h; h = maxHeight; }
                  const canvas = new OffscreenCanvas(w, h);
                  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                  canvas.convertToBlob({ type: 'image/jpeg', quality }).then(blob => {
                    const reader = new FileReader();
                    reader.onload = () => self.postMessage({ dataUrl: reader.result });
                    reader.readAsDataURL(blob);
                  });
                };
                img.src = dataUrl;
              };
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            const worker = new Worker(workerUrl);
            const reader = new FileReader();
            reader.onload = (e) => {
              worker.postMessage({ dataUrl: e.target.result, maxWidth, maxHeight, quality });
              worker.onmessage = (msg) => { URL.revokeObjectURL(workerUrl); worker.terminate(); resolve(msg.data.dataUrl); };
              worker.onerror = () => { URL.revokeObjectURL(workerUrl); worker.terminate(); fallback(); };
            };
            reader.readAsDataURL(file);
          } else {
            fallback();
          }
          function fallback() {
            const reader = new FileReader();
            reader.onload = (e) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                if (h > maxHeight) { w = (w * maxHeight) / h; h = maxHeight; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          }
        });
      },

      compressThumbnail(file) {
        return Utils.compressImage(file, 120, 0.4, 120);
      },

      launchFireworks() {
        const canvas = document.getElementById('fireworkCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const particles = [];
        const colors = ['#ff6b9d','#ffd1dc','#ffb3c6','#ff4081','#fff','#ffd700'];
        for (let burst = 0; burst < 6; burst++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height * 0.6;
          for (let i = 0; i < 60; i++) {
            const angle = (Math.PI * 2 / 60) * i;
            const speed = Math.random() * 5 + 2;
            particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, alpha: 1, color: colors[Math.floor(Math.random()*colors.length)], size: Math.random()*3+1, delay: burst*200 });
          }
        }
        let startTime = null;
        function animate(ts) {
          if (!startTime) startTime = ts;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let alive = false;
          for (const p of particles) {
            if (ts - startTime < p.delay) { alive = true; continue; }
            p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.alpha -= 0.015;
            if (p.alpha > 0) { alive = true; ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
          }
          if (alive) requestAnimationFrame(animate);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        requestAnimationFrame(animate);
      },

      stopAllTimers() {
        const timers = State.get('activeTimers');
        timers.forEach(id => { clearInterval(id); clearTimeout(id); });
        State.set('activeTimers', []);
        const listeners = State.get('activeListeners');
        listeners.forEach(ref => { try { ref.off('value'); } catch(e) {} });
        State.set('activeListeners', []);
        const ac = State.get('audioCtx');
        if (ac) { try { ac.close(); } catch(e) {} State.set('audioCtx', null); }
        const rt = State.get('recTimerInterval');
        if (rt) { clearInterval(rt); State.set('recTimerInterval', null); }
        const pi = State.get('previewInterval');
        if (pi) { clearInterval(pi); State.set('previewInterval', null); }
      },

      addTimer(id) { State.push('activeTimers', id); return id; },

      safeSetLocalStorage(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch(e) {
          if (e.name === 'QuotaExceededError' || e.code === 22) {
            const keys = Object.keys(localStorage).filter(k => k.startsWith('capsule_local_'));
            keys.slice(0, 2).forEach(k => localStorage.removeItem(k));
            try { localStorage.setItem(key, value); } catch(e2) {
              console.warn('存储空间不足，部分回忆无法缓存', e2);
              Utils.showToast('存储空间不足，部分回忆可能无法缓存', 'warn');
            }
          }
        }
      },

      showToast(msg, type = 'info') {
        const t = document.createElement('div');
        const colors = { info: '#ff6b9d', warn: '#f59e0b', error: '#e03131' };
        t.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${colors[type]||colors.info};color:white;padding:12px 24px;border-radius:50px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.4s;pointer-events:none;`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2800);
      }
    };

    // ===================== DB 对象 =====================
    const DB = {
      async createCapsule(metaData) {
        const newRef = _fbDb.ref('capsules').push();
        await newRef.set(metaData);
        return newRef.key;
      },
      async uploadImages(token, imagesBase64, onProgress) {
        const total = imagesBase64.length;
        const uploadBatchSize = 5;
        for (let i = 0; i < total; i += uploadBatchSize) {
          const batch = imagesBase64.slice(i, i + uploadBatchSize);
          const batchObj = {};
          batch.forEach((img, j) => { batchObj[i + j] = img; });
          await _fbDb.ref('capsules/' + token + '/images').update(batchObj);
          if (onProgress) onProgress(Math.min(i + uploadBatchSize, total), total);
        }
      },
      getCapsule(token) {
        return _fbDb.ref('capsules/' + token).once('value').then(snap => {
          const data = snap.val();
          if (data && data.images && !Array.isArray(data.images)) {
            data.images = Object.keys(data.images).sort((a,b) => Number(a)-Number(b)).map(k => data.images[k]);
          }
          return data;
        });
      },
      async markViewed(token) {
        await _fbDb.ref('capsules/' + token + '/viewed').set(true);
      },
      async markForgiven(token) {
        await _fbDb.ref('forgiven/' + token).set(true);
        await _fbDb.ref('capsules/' + token).remove();
      },
      isForgiven(token) {
        return _fbDb.ref('forgiven/' + token).once('value').then(s => s.exists());
      },
      watchViewed(token, cb) {
        const ref = _fbDb.ref('capsules/' + token + '/viewed');
        ref.on('value', snap => { if (snap.val() === true) cb(); });
        State.push('activeListeners', ref);
        return ref;
      }
    };

    // ===================== UI 对象 =====================
    const UI = {
      renderPasswordGate() {
        Utils.stopAllTimers();
        const container = document.getElementById('mainContainer');
        container.innerHTML = `
          <div class="lock-icon capsule-drop">🔐</div>
          <h1 class="fade-in">验证你的胶囊</h1>
          <p class="sub-title fade-in-delay">请输入购买后获得的专属密码</p>
          <input type="password" class="password-input fade-in-delay" id="passwordInput" placeholder="请输入密码">
          <p class="error-msg" id="errorMsg">❌ 密码错误，请重试</p>
          <button class="btn fade-in-delay2" id="verifyBtn">🔓 验证进入</button>
          <p class="note fade-in-delay2">💡 密码由卖家提供，每个密码仅限使用一次</p>
        `;
        const verifyBtn = document.getElementById('verifyBtn');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        
        verifyBtn.addEventListener('click', async () => {
          const v = passwordInput.value.trim();
          if (!v) { errorMsg.style.display = 'block'; return; }
          
          // 对输入的密码进行 SHA-256 哈希
          const hash = await Utils.sha256(v);
          
          // 查询 Firebase 中是否存在该哈希节点
          try {
            const snapshot = await _fbDb.ref('valid_passwords_hashed/' + hash).once('value');
            if (snapshot.exists()) {
              errorMsg.style.display = 'none';
              UI.renderSender();
            } else {
              errorMsg.textContent = '❌ 密码错误，请重试';
              errorMsg.style.display = 'block';
              passwordInput.value = '';
            }
          } catch (err) {
            errorMsg.textContent = '⚠️ 网络连接失败，请稍后重试';
            errorMsg.style.display = 'block';
          }
        });
        passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') verifyBtn.click(); });
      },

      renderSender() {
        Utils.stopAllTimers();
        State.set('selectedFiles', []);
        State.set('voiceBase64', null);
        State.set('thumbnailCache', []);
        const container = document.getElementById('mainContainer');
        container.innerHTML = `
          ${UI._buildThemeSelector()}
          <h1>📸 制作和好胶囊</h1>
          <p class="sub-title">定制一份专属于TA的回忆</p>
          <input type="text" class="input-field" id="nicknameInput" placeholder="💝 输入TA的昵称（必填）" maxlength="20">
          <div class="upload-area" id="uploadTrigger">
            <span class="upload-icon">🖼️</span>
            <div class="upload-text">点击选择照片（2～100张）</div>
            <div class="upload-count" id="uploadCount">已选 0 张</div>
            <p style="font-size:11px;color:var(--text-light);margin-top:6px;margin-bottom:0;">💡 选择 10～30 张最有代表性的瞬间，太多可能会让对方失去耐心哦</p>
          </div>
          <input type="file" id="fileInput" multiple accept="image/*" style="display:none;">
          <div class="preview-grid" id="previewGrid"></div>
          <div class="message-section">
            <label class="message-label">💬 想对TA说的话（选填）</label>
            <textarea class="message-textarea" id="messageInput" placeholder="对不起，那天是我太冲动了..." maxlength="200"></textarea>
            <div class="char-count"><span id="charCount">0</span>/200</div>
          </div>
          <div class="voice-section">
            <label class="message-label">🎙️ 语音留言（选填，最长60秒）</label>
            <div style="font-size:11px;color:var(--text-light);margin-bottom:8px;">🎤 按住说话，说出你心里那句对不起</div>
            <div class="voice-row">
              <button class="voice-btn" id="voiceBtn">🎤 按住录音</button>
              <span class="voice-duration" id="voiceDuration"></span>
              <span id="voiceActions" style="display:none;"></span>
            </div>
            <div class="voice-status" id="voiceStatus"></div>
            <canvas id="waveCanvas" width="200" height="40" style="display:none;margin-top:8px;border-radius:8px;background:rgba(255,209,220,0.2);"></canvas>
            <div id="micErrorBox" style="display:none;background:rgba(255,235,235,0.9);border:1px solid rgba(220,50,50,0.2);border-radius:14px;padding:14px;margin-top:10px;font-size:13px;color:#c0392b;text-align:left;">
              <b>无法访问麦克风</b>，你可以改用文字留言 ✍️<br>
              <button id="retryMicBtn" style="margin-top:8px;background:var(--pink-deep);color:white;border:none;padding:7px 16px;border-radius:50px;font-size:12px;cursor:pointer;font-family:inherit;">重试授权</button>
            </div>
          </div>
          <label class="message-label">🎵 选择背景音乐</label>
          <div class="music-row">
            <select class="select-field" id="musicSelect">
              <option value="none">🔇 无音乐</option>
              <option value="melody1" selected>🎹 舒缓钢琴 · 回忆</option>

          <button class="btn" id="generateBtn" disabled>🔗 生成专属链接</button>
          <div class="progress-wrap" id="progressWrap" style="display:none;">

            <div class="progress-bar"><div class="progress-fill" id="compressFill"></div></div>

            <div class="progress-bar" id="uploadBarWrap" style="display:none;"><div class="progress-fill" id="uploadFill"></div></div>
            <div class="progress-label" id="progressLabel"></div>

        `;

        UI._bindThemeSelector();

      _initSenderLogic() {
        const container = document.getElementById('mainContainer');
        const fileInput = document.getElementById('fileInput');
        const uploadTrigger = document.getElementById('uploadTrigger');
        const previewGrid = document.getElementById('previewGrid');
        const uploadCount = document.getElementById('uploadCount');
        const generateBtn = document.getElementById('generateBtn');
        const messageInput = document.getElementById('messageInput');
        const charCount = document.getElementById('charCount');
        const nicknameInput = document.getElementById('nicknameInput');
        const musicSelect = document.getElementById('musicSelect');
        const questionInput = document.getElementById('questionInput');
        const answerInput = document.getElementById('answerInput');
        const previewMusicBtn = document.getElementById('previewMusicBtn');
        const progressWrap = document.getElementById('progressWrap');
        const compressFill = document.getElementById('compressFill');
        const uploadFill = document.getElementById('uploadFill');
        const uploadBarWrap = document.getElementById('uploadBarWrap');
        const uploadLabel = document.getElementById('uploadLabel');
        const progressLabel = document.getElementById('progressLabel');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const voiceActions = document.getElementById('voiceActions');
        const voiceDuration = document.getElementById('voiceDuration');
        const waveCanvas = document.getElementById('waveCanvas');
        const micErrorBox = document.getElementById('micErrorBox');
        const retryMicBtn = document.getElementById('retryMicBtn');

        function checkGenerateBtn() {
          generateBtn.disabled = !(nicknameInput.value.trim() && State.get('selectedFiles').length >= 2);
        }

        nicknameInput.addEventListener('input', checkGenerateBtn);
        messageInput.addEventListener('input', () => { charCount.textContent = messageInput.value.length; });

        // --- Voice Recording ---
        voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); }, { passive: false });
        voiceBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRec(); }, { passive: false });
        voiceBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); stopRec(); }, { passive: false });
        voiceBtn.addEventListener('mousedown', (e) => { if (e.pointerType === 'touch') return; startRec(); });
        voiceBtn.addEventListener('mouseup', (e) => { if (e.pointerType === 'touch') return; stopRec(); });
        voiceBtn.addEventListener('mouseleave', () => { if (State.get('isRecording')) stopRec(); });

        retryMicBtn.addEventListener('click', () => { micErrorBox.style.display = 'none'; startRec(); });

        let analyserNode = null, waveAnimId = null;

        function drawWave() {
          if (!analyserNode) return;
          const ctx2d = waveCanvas.getContext('2d');
          const bufLen = analyserNode.frequencyBinCount;
          const dataArr = new Uint8Array(bufLen);
          function loop() {
            waveAnimId = requestAnimationFrame(loop);
            analyserNode.getByteTimeDomainData(dataArr);
            ctx2d.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
            ctx2d.lineWidth = 2;
            ctx2d.strokeStyle = '#ff6b9d';
            ctx2d.beginPath();
            const sliceWidth = waveCanvas.width / bufLen;
            let x = 0;
            for (let i = 0; i < bufLen; i++) {
              const v = dataArr[i] / 128.0;
              const y = v * waveCanvas.height / 2;
              i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
              x += sliceWidth;
            }
            ctx2d.lineTo(waveCanvas.width, waveCanvas.height / 2);
            ctx2d.stroke();
          }
          loop();
        }

        function startRec() {
          if (State.get('isRecording')) return;
          if (!navigator.mediaDevices?.getUserMedia) {
            micErrorBox.style.display = 'block'; return;
          }
          navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            micErrorBox.style.display = 'none';
            State.set('isRecording', true);
            const mr = new MediaRecorder(stream);
            State.set('mediaRecorder', mr);
            State.set('audioChunks', []);
            State.set('recSeconds', 0);
            voiceDuration.textContent = '0s';

            try { navigator.vibrate && navigator.vibrate(50); } catch(e) {}

            try {
              const audioCtxLocal = new (window.AudioContext || window.webkitAudioContext)();
              const source = audioCtxLocal.createMediaStreamSource(stream);
              analyserNode = audioCtxLocal.createAnalyser();
              analyserNode.fftSize = 256;
              source.connect(analyserNode);
              waveCanvas.style.display = 'block';
              drawWave();
            } catch(e) {}

            mr.ondataavailable = e => State.get('audioChunks').push(e.data);
            mr.onstop = () => {
              const rt = State.get('recTimerInterval');
              if (rt) { clearInterval(rt); State.set('recTimerInterval', null); }
              State.set('isRecording', false);
              if (waveAnimId) { cancelAnimationFrame(waveAnimId); waveAnimId = null; }
              waveCanvas.style.display = 'none';
              analyserNode = null;

              const secs = State.get('recSeconds');
              if (secs < 1) {
                voiceStatus.textContent = '⚠️ 录音时间太短，请重试';
                voiceDuration.textContent = '';
                return;
              }

              const blob = new Blob(State.get('audioChunks'), { type: 'audio/webm' });
              if (blob.size > 5 * 1024 * 1024) {
                voiceStatus.textContent = '⚠️ 录音文件过大，请缩短时长';
                return;
              }
              const reader = new FileReader();
              reader.onload = () => {
                const result = reader.result;
                if (!result.startsWith('data:audio/webm')) {
                  voiceStatus.textContent = '⚠️ 录音格式异常，请重试';
                  return;
                }
                State.set('voiceBase64', result);
                voiceStatus.textContent = `✅ 已录制 ${secs}秒，可回放或重录`;
                voiceActions.innerHTML = `<button class="replay-btn" id="replayVoiceBtn">🔊 回放</button> <button class="replay-btn" id="rerecordBtn">🔄 重录</button>`;
                document.getElementById('replayVoiceBtn').addEventListener('click', () => { new Audio(State.get('voiceBase64')).play(); });
                document.getElementById('rerecordBtn').addEventListener('click', () => {
                  State.set('voiceBase64', null);
                  voiceActions.innerHTML = '';
                  voiceStatus.textContent = '';
                  voiceDuration.textContent = '';
                  voiceBtn.style.display = 'inline-block';
                  voiceActions.style.display = 'none';
                });
                voiceBtn.style.display = 'none';
                voiceActions.style.display = 'inline';
              };
              reader.readAsDataURL(blob);
            };

            mr.start();
            voiceBtn.classList.add('recording');
            voiceBtn.textContent = '🎤 松开结束';
            voiceStatus.textContent = '🔴 录音中...';

            const rt = State.get('recTimerInterval');
            if (rt) clearInterval(rt);
            const newRt = setInterval(() => {
              const s = State.get('recSeconds') + 1;
              State.set('recSeconds', s);
              voiceDuration.textContent = s + 's';
              if (s >= 60) stopRec();
            }, 1000);
            State.set('recTimerInterval', newRt);

          }).catch((err) => {
            micErrorBox.style.display = 'block';
          });
        }

        function stopRec() {
          const rt = State.get('recTimerInterval');
          if (rt) { clearInterval(rt); State.set('recTimerInterval', null); }
          voiceBtn.classList.remove('recording');
          voiceBtn.textContent = '🎤 按住录音';
          const mr = State.get('mediaRecorder');
          if (mr && mr.state === 'recording') {
            mr.stop();
            mr.stream.getTracks().forEach(t => t.stop());
          } else {
            State.set('isRecording', false);
            if (!State.get('voiceBase64')) {
              voiceStatus.textContent = '';
              voiceDuration.textContent = '';
            }
          }
        }

        // --- Photo Upload ---
        uploadTrigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
          const files = Array.from(e.target.files);
          if (!files.length) return;
          const merged = [...State.get('selectedFiles'), ...files].slice(0, 100);
          State.set('selectedFiles', merged);

          const cache = State.get('thumbnailCache');
          const needed = merged.length - cache.length;
          if (needed > 0) {
            const newFiles = merged.slice(cache.length);
            for (let i = 0; i < newFiles.length; i++) {
              cache.push(await Utils.compressThumbnail(newFiles[i]));
              if (i % 5 === 4) await new Promise(r => setTimeout(r, 0));
            }
          }
          State.set('thumbnailCache', cache);

          renderPreview();
          checkGenerateBtn();
          fileInput.value = '';
        });

        function renderPreview() {
          const selectedFiles = State.get('selectedFiles');
          const thumbnailCache = State.get('thumbnailCache');
          uploadCount.textContent = '已选 ' + selectedFiles.length + ' 张';
          previewGrid.innerHTML = '';
          const visibleCount = Math.min(selectedFiles.length, 12);
          for (let i = 0; i < visibleCount; i++) {
            const item = document.createElement('div');
            item.className = 'preview-item';
            const thumbSrc = thumbnailCache[i] || '';
            item.innerHTML = `<img src="${thumbSrc}" class="preview-thumb" loading="lazy"><button class="preview-delete" data-idx="${i}">✕</button>`;
            item.querySelector('.preview-delete').addEventListener('click', () => {
              const sf = State.get('selectedFiles'); sf.splice(i, 1); State.set('selectedFiles', sf);
              const tc = State.get('thumbnailCache'); tc.splice(i, 1); State.set('thumbnailCache', tc);
              renderPreview(); checkGenerateBtn();
            });
            previewGrid.appendChild(item);
          }
          if (selectedFiles.length > 12) {
            const more = document.createElement('div');
            more.style.cssText = 'grid-column:span 2;font-size:12px;color:var(--text-light);text-align:center;padding:8px;';
            more.textContent = '···还有 ' + (selectedFiles.length - 12) + ' 张';
            previewGrid.appendChild(more);
          }
        }

        // --- Music Preview ---
        function stopPreview() {
          const pi = State.get('previewInterval');
          if (pi) { clearInterval(pi); State.set('previewInterval', null); }
          const ac = State.get('audioCtx');
          if (ac) { try { ac.close(); } catch(e) {} State.set('audioCtx', null); }
          previewMusicBtn.textContent = '▶ 试听';
        }
        previewMusicBtn.addEventListener('click', () => {
          if (State.get('previewInterval')) { stopPreview(); return; }
          const sel = musicSelect.value;
          if (sel === 'none') { Utils.showToast('请先选择一首音乐'); return; }
          try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            State.set('audioCtx', ac);
            const notes = { melody1: [523,659,784,1047,784,659,523,440], melody2: [392,440,523,659,523,440,392,330] }[sel] || [];
            let ni = 0;
            function playNote() {
              const ctx2 = State.get('audioCtx'); if (!ctx2) return;
              const o = ctx2.createOscillator(), g = ctx2.createGain();
              o.type = 'sine'; o.frequency.value = notes[ni % notes.length];
              g.gain.setValueAtTime(0.18, ctx2.currentTime);
              g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 1.3);
              o.connect(g); g.connect(ctx2.destination);
              o.start(); o.stop(ctx2.currentTime + 1.3); ni++;
            }
            playNote(); previewMusicBtn.textContent = '⏹ 停止';
            State.set('previewInterval', setInterval(playNote, 1900));
            Utils.addTimer(setTimeout(() => { if (State.get('previewInterval')) stopPreview(); }, 6000));
          } catch(e) { Utils.showToast('试听失败，但音乐仍会包含在胶囊中'); stopPreview(); }
        });

        // --- Generate Button ---
        generateBtn.addEventListener('click', async () => {
          const selectedFiles = State.get('selectedFiles');
          if (selectedFiles.length < 2 || !nicknameInput.value.trim()) return;

          generateBtn.disabled = true;
          generateBtn.textContent = '⏳ 生成中...';
          progressWrap.style.display = 'block';

          const total = selectedFiles.length;
          const imagesBase64 = [];
          const batchSize = 5;
          progressLabel.textContent = `正在压缩图片 (0/${total})...`;
          compressFill.style.width = '0%';

          for (let i = 0; i < total; i += batchSize) {
            const batch = selectedFiles.slice(i, i + batchSize);
            const results = await Promise.all(batch.map(f => Utils.compressImage(f)));
            imagesBase64.push(...results);
            const done = Math.min(i + batch.length, total);
            compressFill.style.width = Math.round((done / total) * 100) + '%';
            progressLabel.textContent = `正在压缩图片 (${done}/${total})...`;
            await new Promise(r => setTimeout(r, 10));
          }

          uploadBarWrap.style.display = 'block';
          uploadLabel.style.display = 'block';
          uploadFill.style.width = '0%';
          progressLabel.textContent = '正在创建胶囊...';

          const metaData = {
            nickname: nicknameInput.value.trim(),
            message: messageInput.value.trim() || '',
            voice: State.get('voiceBase64') || null,
            music: musicSelect.value,
            question: questionInput.value.trim() || '',
            answer: answerInput.value.trim() || '',
            viewed: false,
            imageCount: imagesBase64.length
          };

          let newToken;
          try {
            newToken = await DB.createCapsule(metaData);
          } catch(err) {
            showUploadError(err.message || '未知错误');
            return;
          }

          progressLabel.textContent = `正在上传图片 (0/${total})...`;

          try {
            await DB.uploadImages(newToken, imagesBase64, (done, t) => {
              uploadFill.style.width = Math.round((done / t) * 100) + '%';
              progressLabel.textContent = `正在上传图片 (${done}/${t})...`;
            });
          } catch(err) {
            try { await _fbDb.ref('capsules/' + newToken).remove(); } catch(e) {}
            showUploadError(err.message || '图片上传失败');
            return;
          }

          uploadFill.style.width = '100%';
          progressLabel.textContent = '✅ 上传完成！';

          function showUploadError(msg) {
            progressWrap.style.display = 'none';
            generateBtn.disabled = false;
            generateBtn.textContent = '🔗 生成专属链接';
            const errDiv = document.createElement('div');
            errDiv.style.cssText = 'background:rgba(255,235,235,0.9);border:1px solid rgba(220,50,50,0.2);border-radius:14px;padding:14px;margin-top:12px;font-size:13px;color:#c0392b;text-align:left;';
            errDiv.innerHTML = `<b>❌ 上传失败：</b>${Utils.escapeHtml(msg)}<br><small>请检查：①Firebase规则 ②网络连接 ③尝试减少照片</small><br><button id="retryUploadBtn" style="margin-top:8px;background:var(--pink-deep);color:white;border:none;padding:7px 16px;border-radius:50px;font-size:12px;cursor:pointer;font-family:inherit;">🔄 重试</button>`;
            container.appendChild(errDiv);
            document.getElementById('retryUploadBtn').addEventListener('click', () => { errDiv.remove(); generateBtn.click(); });
          }

          let created = JSON.parse(localStorage.getItem('created_tokens') || '[]');
          created.push(newToken);
          Utils.safeSetLocalStorage('created_tokens', JSON.stringify(created));

          const link = window.location.href.split('?')[0] + '?token=' + newToken;

          container.innerHTML = `
            <div style="font-size:52px;margin-bottom:14px;" class="capsule-drop">✅</div>
            <h1 class="fade-in">胶囊生成成功！</h1>
            <p class="sub-title fade-in-delay">专属链接已就绪，发给TA吧</p>
            <div style="background:var(--pink-bg);border-radius:16px;padding:14px;word-break:break-all;font-size:11px;color:var(--pink-deep);margin:16px 0;border:1px solid var(--pink-pale);" class="fade-in-delay">${link}</div>
            <button class="btn fade-in-delay" id="copyBtn">📋 一键复制链接</button>
            <p id="viewStatus" style="color:var(--text-light);margin-top:16px;font-size:13px;">⏳ 等待TA打开...</p>
            <p class="note">💡 对方点击"原谅"后，云端数据自动删除，但TA手机上将永久保留这份回忆</p>
          `;

          DB.watchViewed(newToken, () => {
            const vs = document.getElementById('viewStatus');
            if (vs) vs.textContent = '✅ TA已打开胶囊 💕';
          });

          document.getElementById('copyBtn').addEventListener('click', () => {
            if (navigator.clipboard) {
              navigator.clipboard.writeText(link).then(() => Utils.showToast('链接已复制！快去发给TA吧 💕'));
            } else {
              const ta = document.createElement('textarea');
              ta.value = link; document.body.appendChild(ta); ta.select();
              document.execCommand('copy'); document.body.removeChild(ta);
              Utils.showToast('链接已复制！快去发给TA吧 💕');
            }
          });
        });
      },

      renderReceiver(token) {
        Utils.stopAllTimers();
        const container = document.getElementById('mainContainer');
        const createdTokens = JSON.parse(localStorage.getItem('created_tokens') || '[]');
        if (createdTokens.includes(token)) { UI.buildSenderPreview(token); return; }

        const localKey = 'capsule_local_' + token;
        State.set('localKey', localKey);
        const localData = localStorage.getItem(localKey);
        if (localData) {
          try { UI.buildMemorialUI(JSON.parse(localData)); return; } catch(e) {}
        }

        container.innerHTML = `
          <div style="font-size:40px;margin:20px 0;">💊</div>
          <h1>胶囊加载中</h1>
          <div class="progress-bar" style="margin:20px 0;"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <p class="sub-title">请稍等片刻...</p>
        `;

        const pf = document.getElementById('progressFill');
        let prog = 0;
        const pt = setInterval(() => { prog = Math.min(prog + 12, 88); if (pf) pf.style.width = prog + '%'; }, 300);

        DB.isForgiven(token).then(forgiven => {
          if (forgiven) {
            DB.getCapsule(token).then(data => {
              clearInterval(pt);
              if (data) {
                Utils.safeSetLocalStorage(localKey, JSON.stringify(data));
                if (pf) pf.style.width = '100%';
                setTimeout(() => UI.buildMemorialUI(data), 300);
              } else {
                container.innerHTML = '<h1>😔</h1><p class="error-text">这个链接已经失效了</p>';
              }
            }).catch(() => UI._showReceiverError(token, localKey, container));
          } else {
            DB.getCapsule(token).then(data => {
              clearInterval(pt);
              if (!data) { container.innerHTML = '<h1>😔</h1><p class="error-text">这个链接已经失效了</p>'; return; }
              if (!data.viewed) DB.markViewed(token).catch(() => {});
              if (pf) pf.style.width = '100%';
              setTimeout(() => UI.buildReceiverUI(data, token, localKey), 300);
            }).catch(() => { clearInterval(pt); UI._showReceiverError(token, localKey, container); });
          }
        }).catch(() => { clearInterval(pt); UI._showReceiverError(token, localKey, container); });
      },

      _showReceiverError(token, localKey, container) {
        container.innerHTML = `
          <h1>😔</h1>
          <p class="error-text">加载失败，请检查网络后重试</p>
          <button class="btn" id="reloadBtn" style="margin-top:16px;">🔄 重新加载</button>
          <div style="margin-top:20px;text-align:left;">
            <label class="message-label" style="font-size:12px;">离线模式：粘贴胶囊数据JSON</label>
            <textarea class="message-textarea" id="offlineJson" placeholder='{"nickname":"...","images":[...],...}' style="height:70px;font-size:11px;"></textarea>
            <button class="btn" id="offlineBtn" style="margin-top:8px;">📦 离线查看</button>
          </div>
        `;
        document.getElementById('reloadBtn').addEventListener('click', () => UI.renderReceiver(token));
        document.getElementById('offlineBtn').addEventListener('click', () => {
          try {
            const data = JSON.parse(document.getElementById('offlineJson').value.trim());
            if (data && data.images) {
              if (!Array.isArray(data.images)) data.images = Object.values(data.images);
              UI.buildMemorialUI(data);
            } else { Utils.showToast('数据格式不正确', 'error'); }
          } catch(e) { Utils.showToast('JSON 解析失败', 'error'); }
        });
      },

      buildReceiverUI(data, token, localKey) {

        const { nickname, message, music, question, answer, images, voice } = data;
        const hasMsg = message?.trim().length > 0;
        const hasVoice = voice?.length > 0;
        const hasQuiz = question?.trim().length > 0 && answer?.trim().length > 0;

        container.innerHTML = `
          <div class="nickname-bar capsule-drop">💝 专属于 ${Utils.escapeHtml(nickname)} 的胶囊</div>
          <div id="contentArea"></div>
        `;
        const area = document.getElementById('contentArea');

        area.innerHTML = `
          <h1 class="fade-in">💊 你收到一颗和好胶囊</h1>
          <div class="start-card fade-in-delay">
            <span class="start-emoji">🕊️</span>
            <div class="start-desc">${Utils.escapeHtml(nickname)}，这份回忆是专门为你准备的。<br>希望能和你重新开始。<br><br>找一个安静的地方，深呼吸，这些画面值得你静静地看一遍。</div>
            <button class="btn" id="startBtn">📽️ 打开胶囊，看看回忆</button>

          });
        });

        function afterLetter() { if (hasVoice) showVoiceStep(voice, area, afterVoice); else afterVoice(); }
        function afterVoice() { if (hasQuiz) showQuiz(); else showCoupon(); }

        function showQuiz() {
          area.innerHTML = `
            <h1>❓ 在原谅之前...</h1>
            <p style="color:var(--text-mid);margin:16px 0;font-size:15px;line-height:1.7;">${Utils.escapeHtml(question)}</p>

            <p class="quiz-error" id="quizErr">这个答案好像不太对，但你知道那个答案就藏在你们共同的记忆里，再试试看 ❤️</p>

        }

        function showCoupon() {
          area.innerHTML = `
            <h1 class="fade-in">💊 和好胶囊</h1>
            <div class="coupon-card fade-in-delay">
              <div class="coupon-title">专 属 和 好 券</div>

            </div>

            btn.textContent = '💕 和好成功...';
            btn.disabled = true;
            try {
              Utils.safeSetLocalStorage(localKey, JSON.stringify(data));

              area.innerHTML = `
                <div style="font-size:60px;margin:10px 0;" class="capsule-drop">🌸</div>
                <div class="forgiven-msg fade-in">和好成功！<br>你们已经和好如初啦 💕</div>
                <p style="color:var(--text-light);margin-top:14px;font-size:13px;" class="fade-in-delay">这份回忆将永远为你留存</p>
                <button class="memorial-btn fade-in-delay2" id="memBtn">📽️ 再次播放回忆</button>

          });

      },

      buildMemorialUI(data) {
        Utils.stopAllTimers();
        const container = document.getElementById('mainContainer');
        const { nickname, message, music, images, voice } = data;
        const hasMsg = message?.trim().length > 0;
        const hasVoice = voice?.length > 0;

        container.innerHTML = `
          <div class="nickname-bar capsule-drop">💝 专属于 ${Utils.escapeHtml(nickname)} 的和好纪念册</div>
          <h1 class="fade-in">🌸 和好成功！</h1>
          <p class="sub-title fade-in-delay">这份回忆将永远为你留存</p>
          <div id="contentArea"></div>
        `;
        const area = document.getElementById('contentArea');
        area.innerHTML = `
          <div class="start-card fade-in-delay2">
            <span class="start-emoji">🕊️</span>
            <div class="start-desc">你们已经和好如初，<br>但这份回忆值得永远珍藏。</div>
            <button class="memorial-btn" id="memStartBtn">📽️ 再次播放回忆</button>
          </div>
        `;
        document.getElementById('memStartBtn').addEventListener('click', () => {
          playSlideshow(images, music, area, () => {
            if (hasMsg) showLetterStep(message, area, afterLetter);
            else afterLetter();
          });
        });
        function afterLetter() { if (hasVoice) showVoiceStep(voice, area, afterVoice); else afterVoice(); }
        function afterVoice() {
          area.innerHTML = '<div style="font-size:48px;margin:16px 0;">💕</div><p style="color:var(--text-light);">这些回忆，永远属于你们。</p>';
        }
      },

      _buildThemeSelector() {
        return `<div class="theme-selector" id="themeSelector"><div class="theme-dot pink active" data-theme="pink" title="粉色"></div><div class="theme-dot blue" data-theme="blue" title="蓝色"></div><div class="theme-dot dark" data-theme="dark" title="深色"></div><div class="theme-dot gold" data-theme="gold" title="金色"></div></div>`;
      },

      _bindThemeSelector() {
        document.querySelectorAll('.theme-dot').forEach(dot => {
          dot.addEventListener('click', () => {
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            applyTheme(dot.dataset.theme);
          });
        });
      }
    };

    // ===================== Particles =====================
    (function initParticles() {
      const container = document.getElementById('bgParticles');
      const colors = ['#ff6b9d','#ffd1dc','#c44569','#ffb3c6','#ffffff'];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 2;
        p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;`;
        container.appendChild(p);
      }
    })();

    function applyTheme(theme) {
      document.body.className = theme === 'pink' ? '' : 'theme-' + theme;
      State.set('currentTheme', theme);
    }

    // ===================== Shared Step Renderers =====================
    function showLetterStep(message, area, cb) {
      const formattedMessage = Utils.escapeHtml(message).replace(/\n/g, '<br>');
      area.innerHTML = `
        <h1 class="fade-in">💌 TA给你写了一封信</h1>
        <p class="sub-title fade-in-delay">点一点信封，拆开看看吧</p>
        <div class="envelope-wrapper fade-in-delay">
          <div class="envelope-container" id="envBox">
            <div class="envelope-back"></div>
            <div class="letter-paper" id="envPaper">
              <div class="letter-deco">🌸</div>
              <div class="letter-text">${formattedMessage}</div>
            </div>
            <div class="envelope-front">
              <div class="env-left"></div><div class="env-right"></div><div class="env-bottom"></div>
            </div>
            <div class="envelope-flap" id="envFlap"></div>
            <div class="envelope-seal" id="envSeal"><div class="seal-inner">💝</div></div>
            <p class="envelope-hint" id="envHint">点击拆开这封手写信 ✉️</p>
          </div>
        </div>
        <div id="letterAction" style="opacity:0;transition:opacity 0.5s;margin-top:10px;text-align:center;"></div>
      `;

      const envBox = document.getElementById('envBox');
      const flap = document.getElementById('envFlap');
      const paper = document.getElementById('envPaper');
      const seal = document.getElementById('envSeal');
      const actionArea = document.getElementById('letterAction');

      envBox.style.willChange = 'transform';
      flap.style.willChange = 'transform';

      envBox.addEventListener('click', () => {
        if (envBox.classList.contains('is-open')) return;
        envBox.classList.add('is-open');
        seal.classList.add('broken');
        flap.classList.add('open');
        setTimeout(() => { paper.classList.add('show'); }, 400);
        setTimeout(() => {
          envBox.style.willChange = 'auto';
          flap.style.willChange = 'auto';
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.innerHTML = '收下这封信，继续 →';
          actionArea.appendChild(btn);
          actionArea.style.opacity = 1;
          btn.addEventListener('click', () => { if (cb) cb(); });
        }, 1800);
      });
    }

    function showVoiceStep(voice, area, cb) {
      area.innerHTML = `
        <h1>🎙️ TA还给你录了一段话</h1>
        <p class="sub-title">按下播放键，听听TA说什么</p>
        <div class="voice-player-wrapper">
          <button class="voice-play-btn" id="vPlayBtn"><div class="voice-play-icon"></div></button>
          <div class="voice-wave"><span></span><span></span><span></span><span></span></div>
          <span class="voice-time" id="vTime">0:00</span>
        </div>
        <audio id="vAudio" src="${voice}" style="display:none;" preload="auto"></audio>
        <button class="btn" id="vContinueBtn" style="margin-top:25px;">继续 →</button>
      `;
      const audio = document.getElementById('vAudio');
      const playBtn = document.getElementById('vPlayBtn');
      const timeEl = document.getElementById('vTime');
      let timer = null;

      playBtn.addEventListener('click', () => {
        if (audio.paused) {
          audio.play(); playBtn.classList.add('playing');
          timer = setInterval(() => {
            const s = Math.floor(audio.currentTime);
            timeEl.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
          }, 500);
        } else {
          audio.pause(); playBtn.classList.remove('playing'); clearInterval(timer);
        }
      });
      audio.addEventListener('ended', () => { playBtn.classList.remove('playing'); clearInterval(timer); });
      document.getElementById('vContinueBtn').addEventListener('click', () => { audio.pause(); if (cb) cb(); });
    }

    function playSlideshow(images, music, area, cb) {
      let slideshowAudioCtx = null, musicOn = false;

      function startMusic() {
        if (music === 'none' || musicOn) return;
        try {
          slideshowAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const notes = {
            melody1: [523,659,784,1047,784,659,523,440,523,659,784,659,523,440,392,440],
            melody2: [392,440,523,392,440,523,659,523,440,392,330,392,440,523,440,392]
          }[music] || [];
          let ni = 0;
          function p() {
            if (!slideshowAudioCtx) return;
            const o = slideshowAudioCtx.createOscillator(), g = slideshowAudioCtx.createGain();
            o.type = 'sine'; o.frequency.value = notes[ni%notes.length];
            g.gain.setValueAtTime(0.12, slideshowAudioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, slideshowAudioCtx.currentTime+1.8);
            o.connect(g); g.connect(slideshowAudioCtx.destination);
            o.start(); o.stop(slideshowAudioCtx.currentTime+1.8); ni++;
          }
          p(); musicOn = true;
          const id = setInterval(p, 2400);
          Utils.addTimer(id);
        } catch(e) {}
      }
      function stopMusic() {
        if (slideshowAudioCtx) { try { slideshowAudioCtx.close(); } catch(e) {} slideshowAudioCtx = null; }
        musicOn = false;
      }

      const phrases = ['这些画面，你还记得吗...','每一个瞬间，都是真的...','回忆不会说谎...','那时候的我们，多好啊...','TA一直记得...','珍惜每一次在一起...'];
      area.innerHTML = `
        <div class="slideshow-viewer" id="slideViewer">
          ${images.map((src, i) => `<img src="${src}" class="${i===0?'active':''}">`).join('')}
          <div class="slide-counter" id="slideCounter">1 / ${images.length}</div>
          <div class="slide-phrase" id="slidePhrase">回忆缓缓展开...</div>
        </div>
      `;
      startMusic();

      const imgs = document.querySelectorAll('.slideshow-viewer img');
      const counter = document.getElementById('slideCounter');
      const phrase = document.getElementById('slidePhrase');
      let cur = 0;

      function next() {
        imgs[cur].classList.remove('active'); cur++;
        if (cur < images.length) {
          imgs[cur].classList.add('active');
          counter.textContent = (cur+1) + ' / ' + images.length;
          if (phrases[cur-1]) phrase.textContent = phrases[cur-1];
          Utils.addTimer(setTimeout(next, 3500));
        } else {
          phrase.textContent = '回忆播完了，但那些美好从未离开 ✨';
          counter.textContent = '';
          stopMusic();
          if (cb) Utils.addTimer(setTimeout(cb, 900));
        }
      }
      Utils.addTimer(setTimeout(next, 3500));
    }

    // ===================== Entry Point =====================
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) { UI.renderReceiver(token); }
    else { UI.renderPasswordGate(); }

    window.addEventListener('beforeunload', () => { Utils.stopAllTimers(); });
  </script>
</body>
</html>
